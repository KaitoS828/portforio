<!DOCTYPE html>
<html lang="ja" id="html">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=5">
  <meta name="format-detection" content="telephone=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>KAITO KANBE | AI Engineer / Developer</title>
  <meta name="description" content="神部凱斗 / AI Engineer & Developer based in Hokkaido, Japan.">

  <style>
    /* =====================================================================
       RESET
    ===================================================================== */
    *, *::before, *::after { box-sizing: border-box; }
    html, body, div, span, h1, h2, h3, h4, h5, h6, p, a, ul, ol, li,
    header, footer, nav, section, article, main, figure {
      margin: 0; padding: 0; border: 0;
    }
    ul, ol { list-style: none; }
    a { text-decoration: none; color: inherit; }

    /* =====================================================================
       SELECTION
    ===================================================================== */
    ::selection        { background: #0000ff; color: #ffff00; }
    ::-moz-selection   { background: #0000ff; color: #ffff00; }

    /* =====================================================================
       BASE
    ===================================================================== */
    html { font-size: 62.5%; scroll-behavior: smooth; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial,
                   'Hiragino Kaku Gothic ProN', 'Hiragino Sans',
                   'Noto Sans JP', sans-serif;
      font-weight: 300;
      font-size: 1.4rem;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    body.is-loaded { opacity: 1; }

    /* =====================================================================
       HERO — #TOP
    ===================================================================== */
    #top {
      position: fixed;
      inset: 0;
      z-index: 1;
      overflow: hidden;
    }

    #canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    #top::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center,
        transparent 40%,
        rgba(0,0,0,0.6) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .hero-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 2;
      pointer-events: none;
      white-space: nowrap;
    }

    .hero-name-en {
      font-size: clamp(3.2rem, 6.5vw, 8rem);
      font-weight: 300;
      letter-spacing: 0.4em;
      line-height: 1;
      opacity: 0;
      transform: rotate3d(1, 0, 0, -90deg);
      transition:
        opacity  1.4s cubic-bezier(0.19, 1, 0.22, 1) 0s,
        transform 1.4s cubic-bezier(0.19, 1, 0.22, 1) 0s;
    }

    .hero-name-ja {
      font-size: clamp(1.4rem, 2.4vw, 2.6rem);
      letter-spacing: 0.6em;
      margin-top: 1.6rem;
      opacity: 0;
      transform: rotate3d(1, 0, 0, -90deg);
      transition:
        opacity  1.4s cubic-bezier(0.19, 1, 0.22, 1) 0.15s,
        transform 1.4s cubic-bezier(0.19, 1, 0.22, 1) 0.15s;
    }

    .hero-divider {
      width: 4rem;
      height: 1px;
      background: rgba(255,255,255,0.3);
      margin: 2.4rem auto;
      opacity: 0;
      transform: rotate3d(1, 0, 0, -90deg);
      transition:
        opacity  1.4s cubic-bezier(0.19, 1, 0.22, 1) 0.25s,
        transform 1.4s cubic-bezier(0.19, 1, 0.22, 1) 0.25s;
    }

    .hero-title {
      font-size: clamp(1rem, 1.4vw, 1.5rem);
      letter-spacing: 0.45em;
      color: rgba(255,255,255,0.55);
      opacity: 0;
      transform: rotate3d(1, 0, 0, -90deg);
      transition:
        opacity  1.4s cubic-bezier(0.19, 1, 0.22, 1) 0.35s,
        transform 1.4s cubic-bezier(0.19, 1, 0.22, 1) 0.35s;
    }

    .hero-location {
      font-size: clamp(0.9rem, 1.1vw, 1.2rem);
      letter-spacing: 0.35em;
      color: rgba(255,255,255,0.3);
      margin-top: 1.2rem;
      opacity: 0;
      transform: rotate3d(1, 0, 0, -90deg);
      transition:
        opacity  1.4s cubic-bezier(0.19, 1, 0.22, 1) 0.45s,
        transform 1.4s cubic-bezier(0.19, 1, 0.22, 1) 0.45s;
    }

    .is-loaded .hero-name-en,
    .is-loaded .hero-name-ja,
    .is-loaded .hero-divider,
    .is-loaded .hero-title,
    .is-loaded .hero-location {
      opacity: 1;
      transform: rotate3d(1, 0, 0, 0deg);
    }

    .scroll-indicator {
      position: absolute;
      bottom: 3.6rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      opacity: 0;
      transition: opacity 1s ease 1.2s;
    }

    .is-loaded .scroll-indicator { opacity: 1; }

    .scroll-indicator span {
      font-size: 0.9rem;
      letter-spacing: 0.35em;
      color: rgba(255,255,255,0.35);
    }

    .scroll-line {
      width: 1px;
      height: 4.8rem;
      background: rgba(255,255,255,0.12);
      position: relative;
      overflow: hidden;
    }

    .scroll-line::after {
      content: '';
      position: absolute;
      top: -100%;
      left: 0;
      width: 1px;
      height: 100%;
      background: rgba(255,255,255,0.7);
      animation: scrollPulse 2.2s ease-in-out infinite;
    }

    @keyframes scrollPulse {
      0%   { top: -100%; opacity: 1; }
      100% { top: 100%;  opacity: 0; }
    }

    /* =====================================================================
       GLOBAL NAVIGATION
    ===================================================================== */
    .g-nav {
      position: fixed;
      top: 0;
      right: 0;
      z-index: 200;
      padding: 3.2rem 4.8rem;
    }

    .g-nav ul {
      display: flex;
      gap: 3.2rem;
      align-items: center;
    }

    .g-nav li {
      opacity: 0;
      transform: rotate3d(1, 0, 0, -90deg);
      transition:
        opacity  1s cubic-bezier(0.19, 1, 0.22, 1),
        transform 1s cubic-bezier(0.19, 1, 0.22, 1);
    }

    .g-nav li:nth-child(1) { transition-delay: 0.5s; }
    .g-nav li:nth-child(2) { transition-delay: 0.62s; }
    .g-nav li:nth-child(3) { transition-delay: 0.74s; }

    .is-loaded .g-nav li {
      opacity: 1;
      transform: rotate3d(1, 0, 0, 0deg);
    }

    .g-nav a {
      font-size: 1.2rem;
      letter-spacing: 0.25em;
      cursor: pointer;
      position: relative;
      padding-bottom: 2px;
    }

    .g-nav a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 1px;
      background: #fff;
      transition: width 0.35s cubic-bezier(0.19, 1, 0.22, 1);
    }

    .g-nav a:hover::after { width: 100%; }

    .site-copyright {
      position: fixed;
      bottom: 3.2rem;
      left: 4rem;
      z-index: 100;
      font-size: 1rem;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.2);
      opacity: 0;
      transition: opacity 1s ease 1.4s;
    }

    .is-loaded .site-copyright { opacity: 1; }

    /* =====================================================================
       CLOSE BUTTON
    ===================================================================== */
    .close-btn {
      position: fixed;
      top: 2.8rem;
      right: 3.2rem;
      width: 5.6rem;
      height: 5.6rem;
      background: none;
      border: none;
      cursor: pointer;
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .close-btn.is-visible {
      opacity: 1;
      pointer-events: auto;
    }

    .close-btn::before,
    .close-btn::after {
      content: '';
      position: absolute;
      width: 2.8rem;
      height: 1px;
      background: #fff;
      transition: transform 0.35s cubic-bezier(0.19, 1, 0.22, 1);
    }

    .close-btn::before { transform: rotate(45deg); }
    .close-btn::after  { transform: rotate(-45deg); }
    .close-btn:hover::before { transform: rotate(45deg) scale(1.15); }
    .close-btn:hover::after  { transform: rotate(-45deg) scale(1.15); }

    /* =====================================================================
       ABOUT PANEL
    ===================================================================== */
    #about {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      z-index: 100;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      transform: translateX(100%);
      transition: transform 1s cubic-bezier(0.19, 1, 0.22, 1);
    }

    #about.is-open { transform: translateX(0); }

    .about-inner {
      max-width: 128rem;
      margin: 0 auto;
      padding: 10rem 6rem 10rem;
    }

    .about-section { margin-bottom: 12rem; }
    .about-section:last-of-type { margin-bottom: 0; }

    .section-heading {
      font-size: clamp(2rem, 3.5vw, 4rem);
      font-weight: 300;
      letter-spacing: 0.2em;
      margin-bottom: 6rem;
      padding-bottom: 2.4rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    /* ---- PROFILE ---- */
    .profile-grid {
      display: grid;
      grid-template-columns: 36rem 1fr;
      gap: 8rem;
      align-items: start;
    }

    .profile-sticky {
      position: sticky;
      top: 10rem;
    }

    .profile-name-en {
      font-size: clamp(2.8rem, 4vw, 4.8rem);
      font-weight: 300;
      letter-spacing: 0.12em;
      line-height: 1.1;
    }

    .profile-name-ja {
      font-size: 1.8rem;
      letter-spacing: 0.45em;
      color: rgba(255,255,255,0.45);
      margin-top: 1.2rem;
    }

    .profile-role {
      font-size: 1.1rem;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.3);
      margin-top: 0.8rem;
      line-height: 1.8;
    }

    .profile-location {
      font-size: 1rem;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.25);
      margin-top: 2.4rem;
    }

    .profile-location-dash {
      display: inline-block;
      width: 2rem;
      height: 1px;
      background: rgba(255,255,255,0.2);
      vertical-align: middle;
      margin-right: 0.8rem;
    }

    .profile-bio {
      font-size: 1.45rem;
      line-height: 2.1;
      color: rgba(255,255,255,0.75);
    }

    .profile-bio p + p { margin-top: 2.4rem; }
    .profile-bio strong { font-weight: 400; color: #fff; }

    /* ---- SKILLS ---- */
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(30rem, 1fr));
      gap: 5rem;
    }

    .skill-category h4 {
      font-size: 1rem;
      letter-spacing: 0.35em;
      color: rgba(255,255,255,0.3);
      margin-bottom: 2rem;
    }

    .skill-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
    }

    .skill-tag {
      font-size: 1.15rem;
      letter-spacing: 0.08em;
      padding: 0.6rem 1.4rem;
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.65);
      transition: border-color 0.3s ease, color 0.3s ease;
      cursor: default;
    }

    .skill-tag:hover {
      border-color: rgba(255,255,255,0.6);
      color: #fff;
    }

    /* ---- WORKS ---- */
    .works-table { width: 100%; }

    .work-row {
      display: grid;
      grid-template-columns: 7rem 1fr auto;
      gap: 4rem;
      align-items: start;
      padding: 3.2rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .work-row:first-child { border-top: 1px solid rgba(255,255,255,0.07); }

    .work-year {
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.28);
      padding-top: 0.4rem;
    }

    .work-body h4 {
      font-size: 1.7rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      line-height: 1.3;
    }

    .work-body h4 a {
      border-bottom: 1px solid rgba(255,255,255,0.25);
      padding-bottom: 1px;
      transition: border-color 0.3s;
    }

    .work-body h4 a:hover { border-color: #fff; }

    .work-client {
      font-size: 1.1rem;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.35);
      margin-top: 0.5rem;
    }

    .work-desc {
      font-size: 1.25rem;
      line-height: 1.9;
      color: rgba(255,255,255,0.58);
      margin-top: 1rem;
      max-width: 64rem;
    }

    .work-desc strong { font-weight: 400; color: #fff; }

    .work-thumbnail {
      display: block;
      width: 100%;
      max-width: 48rem;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      opacity: 0.7;
      margin-bottom: 1.8rem;
      transition: opacity 0.4s ease;
    }

    .work-thumbnail:hover { opacity: 1; }

    .work-badges {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      align-items: flex-end;
      min-width: 8rem;
    }

    .work-badge {
      font-size: 0.95rem;
      letter-spacing: 0.1em;
      padding: 0.3rem 1rem;
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.35);
      white-space: nowrap;
    }

    /* ---- CONTACT ---- */
    .contact-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 2rem 0 4rem;
      gap: 4rem;
    }

    .contact-lead {
      font-size: clamp(1.4rem, 2.2vw, 2.2rem);
      line-height: 2;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.6);
    }

    .contact-links {
      display: flex;
      gap: 3.2rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .contact-links-empty {
      font-size: 1.2rem;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.2);
    }

    .contact-link {
      font-size: 1.2rem;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.4);
      position: relative;
      padding-bottom: 3px;
      transition: color 0.3s ease;
    }

    .contact-link::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 1px;
      background: #fff;
      transition: width 0.35s cubic-bezier(0.19, 1, 0.22, 1);
    }

    .contact-link:hover { color: #fff; }
    .contact-link:hover::after { width: 100%; }

    /* ---- FOOTER ---- */
    .about-footer {
      margin-top: 8rem;
      padding-top: 3.2rem;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .about-footer-copy {
      font-size: 1rem;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.18);
    }

    .admin-link {
      font-size: 0.9rem;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.1);
      transition: color 0.3s;
      border-bottom: 1px solid transparent;
    }

    .admin-link:hover {
      color: rgba(255,255,255,0.4);
      border-bottom-color: rgba(255,255,255,0.3);
    }

    /* =====================================================================
       RESPONSIVE
    ===================================================================== */
    @media (max-width: 1024px) {
      .profile-grid { grid-template-columns: 28rem 1fr; gap: 5rem; }
    }

    @media (max-width: 768px) {
      .about-inner { padding: 9rem 3rem 8rem; }
      .profile-grid { grid-template-columns: 1fr; gap: 4rem; }
      .profile-sticky { position: static; }
      .work-row { grid-template-columns: 6rem 1fr; gap: 2rem; }
      .work-badges { display: none; }
      .g-nav { padding: 2.4rem; }
      .g-nav ul { gap: 2.4rem; }
      .site-copyright { display: none; }
    }

    @media (max-width: 480px) {
      .about-inner { padding: 8rem 2rem 6rem; }
      .g-nav a { font-size: 1.1rem; }
      .g-nav ul { gap: 1.8rem; }
      .hero-content { white-space: normal; width: 90%; }
      .contact-links { gap: 2rem; }
    }
  </style>
</head>

          desc: '地域経済の循環を促進するデジタル地域通貨の運用と開発に従事。テクノロジーを活用した地域内消費の活性化・利便性向上を推進。',
          badges: ['FinTech','DX'],
          url: ''
        },
        {
          year: '2023',
          title: '広尾町 DX推進支援',
          client: '北海道 広尾町',
          desc: '地域おこし協力隊として着任。地方自治体・地域事業者のデジタルトランスフォーメーションを牽引。業務効率化ツールの選定・導入から、デジタルサービスのグランドデザインまで幅広く担当。',
          badges: ['DX','Consulting'],
          url: ''
        },
        {
          year: '—2022',
          title: '住宅営業 — 初年度全国6位',
          client: '住宅メーカー',
          desc: '新卒入社の住宅営業職にて初年度から全国6位の成績を達成。顧客との信頼構築・課題解決型の提案力を身につける。この経験が現在のビジネス開発やDX推進の土台となっている。',
          badges: ['Sales','Business'],
          url: ''
        }
      ],
      contact: {
        lead: 'お仕事のご依頼・ご相談はお気軽にどうぞ。\nOpen to new projects and collaborations.',
        email: '',
        github: '',
        twitter: '',
        linkedin: ''
      }
    };

    /* =====================================================================
       DATA HELPERS
    ===================================================================== */

    /* data.json を fetch、失敗時は localStorage キャッシュ → DEFAULT_DATA */
    function getData() {
      return fetch('./data.json?_=' + Date.now())
        .then(function (res) {
          if (!res.ok) throw new Error('fetch failed');
          return res.json();
        })
        .catch(function () {
          try {
            var raw = localStorage.getItem(STORAGE_KEY);
            if (raw) return JSON.parse(raw);
          } catch (_) { /* ignore */ }
          return JSON.parse(JSON.stringify(DEFAULT_DATA));
        });
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function escAttr(str) {
      return String(str).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    /* =====================================================================
       RENDER FUNCTIONS
    ===================================================================== */
    function renderPortfolio(data) {
      const { profile, skills, works, contact } = data;

      /* Hero */
      document.getElementById('hero-name-en').textContent = profile.nameEn;
      document.getElementById('hero-name-ja').textContent = profile.nameJa;
      document.getElementById('hero-title').textContent   = profile.title;
      document.getElementById('hero-location').textContent = profile.location;

      /* Profile sticky */
      const nameParts = profile.nameEn.split(' ');
      document.getElementById('profile-name-en').innerHTML =
        nameParts.length >= 2
          ? esc(nameParts[0]) + '<br>' + esc(nameParts.slice(1).join(' '))
          : esc(profile.nameEn);

      document.getElementById('profile-name-ja').textContent = profile.nameJa;

      document.getElementById('profile-role').innerHTML =
        profile.title.split(' / ').map(esc).join('<br>');

      document.getElementById('profile-location-ja').textContent =
        profile.locationJa || profile.location;

      /* Bio (supports HTML) */
      document.getElementById('profile-bio').innerHTML =
        profile.bio.map(p => `<p>${p}</p>`).join('');

      /* Skills */
      document.getElementById('skills-grid').innerHTML =
        skills.categories.map(cat => `
          <div class="skill-category">
            <h4>${esc(cat.label)}</h4>
            <div class="skill-tags">
              ${cat.tags.map(t => `<span class="skill-tag">${esc(t)}</span>`).join('')}
            </div>
          </div>
        `).join('');

      /* Works */
      document.getElementById('works-table').innerHTML =
        works.map(w => `
          <div class="work-row">
            <div class="work-year">${esc(w.year)}</div>
            <div class="work-body">
              ${w.imageUrl ? `<img class="work-thumbnail" src="${escAttr(w.imageUrl)}" alt="${escAttr(w.title)}" loading="lazy">` : ''}
              <h4>${w.url
                ? `<a href="${escAttr(w.url)}" target="_blank" rel="noopener">${esc(w.title)}</a>`
                : esc(w.title)}</h4>
              <p class="work-client">${esc(w.client)}</p>
              <p class="work-desc">${w.desc}</p>
            </div>
            <div class="work-badges">
              ${w.badges.map(b => `<span class="work-badge">${esc(b)}</span>`).join('')}
            </div>
          </div>
        `).join('');

      /* Contact */
      document.getElementById('contact-lead').innerHTML =
        esc(contact.lead).replace(/\n/g, '<br>');

      const links = [
        contact.email    && { label: 'EMAIL',      href: `mailto:${contact.email}`,  ext: false },
        contact.github   && { label: 'GITHUB',     href: contact.github,              ext: true  },
        contact.twitter  && { label: 'X / TWITTER', href: contact.twitter,            ext: true  },
        contact.linkedin && { label: 'LINKEDIN',   href: contact.linkedin,            ext: true  },
      ].filter(Boolean);

      const linksEl = document.getElementById('contact-links');
      if (links.length) {
        linksEl.innerHTML = links.map(l =>
          `<a href="${escAttr(l.href)}" class="contact-link"
              ${l.ext ? 'target="_blank" rel="noopener"' : ''}>${esc(l.label)}</a>`
        ).join('');
      } else {
        linksEl.innerHTML =
          '<span class="contact-links-empty">連絡先はadmin.htmlで設定してください</span>';
      }

      /* Footer copyright */
      const year = new Date().getFullYear();
      document.getElementById('site-copyright').textContent =
        `© ${year} ${profile.nameEn}`;
      document.getElementById('about-footer-copy').textContent =
        `© ${year} ${profile.nameEn}`;
    }

    /* =====================================================================
       CANVAS — Neural Network
    ===================================================================== */
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    let particles = [];
    let mouse = { x: -9999, y: -9999 };

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function Particle() {
      this.x  = Math.random() * canvas.width;
      this.y  = Math.random() * canvas.height;
      this.vx = (Math.random() - 0.5) * 0.35;
      this.vy = (Math.random() - 0.5) * 0.35;
      this.r  = Math.random() * 1.5 + 0.5;
      this.a  = Math.random() * 0.4 + 0.1;
    }

    Particle.prototype.update = function () {
      this.x += this.vx;
      this.y += this.vy;
      if (this.x < 0 || this.x > canvas.width)  this.vx *= -1;
      if (this.y < 0 || this.y > canvas.height)  this.vy *= -1;
    };

    Particle.prototype.draw = function () {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,' + this.a + ')';
      ctx.fill();
    };

    function initParticles() {
      particles = [];
      for (var i = 0; i < 90; i++) particles.push(new Particle());
    }

    function drawEdges() {
      var n = particles.length;
      for (var i = 0; i < n; i++) {
        var pi = particles[i];
        for (var j = i + 1; j < n; j++) {
          var pj = particles[j];
          var dx = pi.x - pj.x, dy = pi.y - pj.y;
          var d  = Math.sqrt(dx * dx + dy * dy);
          if (d < 160) {
            ctx.beginPath();
            ctx.moveTo(pi.x, pi.y);
            ctx.lineTo(pj.x, pj.y);
            ctx.strokeStyle = 'rgba(255,255,255,' + (1 - d / 160) * 0.18 + ')';
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
        var mdx = pi.x - mouse.x, mdy = pi.y - mouse.y;
        var md  = Math.sqrt(mdx * mdx + mdy * mdy);
        if (md < 240) {
          ctx.beginPath();
          ctx.moveTo(pi.x, pi.y);
          ctx.lineTo(mouse.x, mouse.y);
          ctx.strokeStyle = 'rgba(255,255,255,' + (1 - md / 240) * 0.45 + ')';
          ctx.lineWidth = 0.6;
          ctx.stroke();
        }
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(function (p) { p.update(); p.draw(); });
      drawEdges();
      requestAnimationFrame(animate);
    }

    window.addEventListener('resize',     function () { resize(); initParticles(); });
    window.addEventListener('mousemove',  function (e) { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('mouseleave', function ()  { mouse.x = -9999; mouse.y = -9999; });
    window.addEventListener('touchmove',  function (e) {
      mouse.x = e.touches[0].clientX;
      mouse.y = e.touches[0].clientY;
    }, { passive: true });
    window.addEventListener('touchend', function () { mouse.x = -9999; mouse.y = -9999; });

    resize();
    initParticles();
    animate();

    /* =====================================================================
       PAGE LOAD
    ===================================================================== */
    function onReady() {
      /* まずデフォルトで即描画してアニメーション開始 */
      renderPortfolio(DEFAULT_DATA);
      requestAnimationFrame(function () {
        document.body.classList.add('is-loaded');
      });

      /* data.json が取れたら上書き描画 */
      getData().then(function (data) {
        renderPortfolio(data);
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', onReady);
    } else {
      onReady();
    }

    /* =====================================================================
       ABOUT PANEL
    ===================================================================== */
    /* リアルタイム同期: admin.html で SAVE されたら自動再描画 */
    window.addEventListener('storage', function (e) {
      if (e.key === STORAGE_KEY && e.newValue) {
        try { renderPortfolio(JSON.parse(e.newValue)); } catch (_) { /* ignore */ }
      }
    });

    var aboutEl  = document.getElementById('about');
    var closeBtn = document.getElementById('close-btn');
    var navLinks = document.querySelectorAll('.g-nav a[data-panel]');

    var sectionMap = {
      profile : 'section-profile',
      works   : 'section-works',
      contact : 'section-contact'
    };

    function openPanel(panelId) {
      aboutEl.classList.add('is-open');
      closeBtn.classList.add('is-visible');
      document.body.style.overflow = 'hidden';
      if (panelId && sectionMap[panelId]) {
        setTimeout(function () {
          var target = document.getElementById(sectionMap[panelId]);
          if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 350);
      }
    }

    function closePanel() {
      aboutEl.classList.remove('is-open');
      closeBtn.classList.remove('is-visible');
      document.body.style.overflow = '';
      aboutEl.scrollTop = 0;
    }

    navLinks.forEach(function (link) {
      link.addEventListener('click', function (e) {
        e.preventDefault();
        openPanel(link.getAttribute('data-panel'));
      });
    });

    closeBtn.addEventListener('click', closePanel);

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && aboutEl.classList.contains('is-open')) closePanel();
    });

  }());
  </script>

</body>
