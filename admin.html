<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ADMIN — Portfolio Editor</title>

  <style>
    /* =====================================================================
       BASE
    ===================================================================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 62.5%; }

    body {
      background: #0d0d0d;
      color: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial,
                   'Hiragino Kaku Gothic ProN', 'Hiragino Sans',
                   'Noto Sans JP', sans-serif;
      font-size: 1.3rem;
      font-weight: 300;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    ::selection      { background: #0000ff; color: #ffff00; }
    ::-moz-selection { background: #0000ff; color: #ffff00; }

    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: inherit; }

    /* =====================================================================
       HEADER
    ===================================================================== */
    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 3.2rem;
      height: 6rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: #111;
      flex-shrink: 0;
      gap: 2rem;
    }

    .admin-logo {
      font-size: 1.1rem;
      letter-spacing: 0.4em;
      color: rgba(255,255,255,0.45);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 1.6rem;
    }

    .admin-logo strong { color: #fff; font-weight: 400; }

    /* GitHub 接続ステータス（ヘッダー内） */
    .gh-status {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 1rem;
      letter-spacing: 0.1em;
    }

    .gh-dot {
      width: 0.7rem;
      height: 0.7rem;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .gh-dot.connected    { background: #4ade80; }
    .gh-dot.connecting   { background: #facc15; animation: pulse 1s infinite; }
    .gh-dot.error        { background: #f87171; }

    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }

    .gh-status-label {
      color: rgba(255,255,255,0.3);
      white-space: nowrap;
    }

    .admin-actions {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    /* =====================================================================
       BUTTONS
    ===================================================================== */
    .btn {
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      padding: 0.7rem 1.8rem;
      border: 1px solid rgba(255,255,255,0.2);
      background: none;
      color: rgba(255,255,255,0.6);
      transition: border-color 0.25s, color 0.25s, background 0.25s, opacity 0.2s;
      white-space: nowrap;
    }

    .btn:hover:not(:disabled) {
      border-color: rgba(255,255,255,0.6);
      color: #fff;
    }

    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .btn-primary {
      background: #fff;
      color: #000;
      border-color: #fff;
      font-weight: 400;
    }

    .btn-primary:hover:not(:disabled) {
      background: rgba(255,255,255,0.85);
      color: #000;
    }

    .btn-danger { border-color: rgba(220,50,50,0.4); color: rgba(220,50,50,0.7); }
    .btn-danger:hover:not(:disabled) {
      border-color: rgba(220,50,50,0.8);
      color: rgb(220,50,50);
      background: rgba(220,50,50,0.05);
    }

    .btn-import {
      display: inline-block;
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      padding: 0.7rem 1.8rem;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.6);
      transition: border-color 0.25s, color 0.25s;
      white-space: nowrap;
      cursor: pointer;
    }
    .btn-import:hover { border-color: rgba(255,255,255,0.6); color: #fff; }

    /* =====================================================================
       BODY LAYOUT
    ===================================================================== */
    .admin-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* =====================================================================
       SIDEBAR
    ===================================================================== */
    .admin-sidebar {
      width: 20rem;
      border-right: 1px solid rgba(255,255,255,0.06);
      background: #111;
      flex-shrink: 0;
      padding: 3.2rem 0;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .tab-btn {
      display: block;
      width: 100%;
      text-align: left;
      padding: 1.2rem 2.8rem;
      font-size: 1.1rem;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.35);
      background: none;
      border: none;
      border-left: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }

    .tab-btn:hover { color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.03); }
    .tab-btn.active { color: #fff; border-left-color: #fff; background: rgba(255,255,255,0.04); }

    .tab-btn.settings-btn {
      margin-top: auto;
      border-top: 1px solid rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.25);
    }

    .tab-btn.settings-btn.active { color: #fff; }

    /* =====================================================================
       MAIN AREA
    ===================================================================== */
    .admin-main {
      flex: 1;
      overflow-y: auto;
      padding: 4rem 5rem 8rem;
    }

    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* =====================================================================
       FORM ELEMENTS
    ===================================================================== */
    .form-section-title {
      font-size: 1.8rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      margin-bottom: 3.2rem;
      padding-bottom: 1.6rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.8);
    }

    .form-group { margin-bottom: 2.4rem; }

    .form-label {
      display: block;
      font-size: 1rem;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.35);
      margin-bottom: 0.8rem;
    }

    .form-label small {
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.2);
      margin-left: 1rem;
    }

    .form-input, .form-textarea {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff;
      font-family: inherit;
      font-size: 1.3rem;
      font-weight: 300;
      padding: 1rem 1.4rem;
      line-height: 1.6;
      transition: border-color 0.2s;
      outline: none;
      border-radius: 0;
      -webkit-appearance: none;
    }

    .form-input:focus, .form-textarea:focus {
      border-color: rgba(255,255,255,0.45);
    }

    .form-input[type="password"] { letter-spacing: 0.1em; }

    .form-textarea { resize: vertical; min-height: 10rem; }

    .form-row {
      display: grid;
      grid-template-columns: 12rem 1fr;
      gap: 1.6rem;
    }

    .form-hint {
      font-size: 1rem;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.18);
      margin-top: 0.6rem;
      line-height: 1.7;
    }

    .form-hint a {
      color: rgba(255,255,255,0.35);
      border-bottom: 1px solid rgba(255,255,255,0.15);
    }

    /* =====================================================================
       SETTINGS — GitHub
    ===================================================================== */
    .settings-banner {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      padding: 1.4rem 2rem;
      border: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 3.2rem;
      font-size: 1.2rem;
      letter-spacing: 0.1em;
    }

    .settings-banner .dot {
      width: 0.8rem;
      height: 0.8rem;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .settings-banner.ok     { border-color: rgba(74,222,128,0.25); }
    .settings-banner.ok     .dot { background: #4ade80; }
    .settings-banner.err    { border-color: rgba(248,113,113,0.25); }
    .settings-banner.err    .dot { background: #f87171; }
    .settings-banner.none   { border-color: rgba(255,255,255,0.08); }
    .settings-banner.none   .dot { background: rgba(255,255,255,0.2); }

    .settings-banner-text { color: rgba(255,255,255,0.5); }
    .settings-banner-text strong { color: #fff; font-weight: 400; }

    .settings-divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 3.2rem 0;
    }

    .settings-actions { display: flex; gap: 1.2rem; align-items: center; }

    /* =====================================================================
       BIO PARAGRAPHS
    ===================================================================== */
    .bio-list { display: flex; flex-direction: column; gap: 1.2rem; }

    .bio-item { display: flex; gap: 1rem; align-items: flex-start; }
    .bio-item .form-textarea { min-height: 7rem; }

    .bio-item-controls {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      flex-shrink: 0;
    }

    .icon-btn {
      width: 3.2rem;
      height: 3.2rem;
      background: none;
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.4);
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, color 0.2s;
      flex-shrink: 0;
    }

    .icon-btn:hover { border-color: rgba(255,255,255,0.5); color: #fff; }
    .icon-btn.danger:hover { border-color: rgba(220,50,50,0.6); color: rgba(220,50,50,0.9); }

    /* =====================================================================
       TAG INPUT
    ===================================================================== */
    .tag-block {
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.03);
      padding: 1rem 1.2rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem;
      align-items: center;
      min-height: 4.8rem;
      cursor: text;
    }

    .tag-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.1rem;
      letter-spacing: 0.05em;
      padding: 0.3rem 0.9rem;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.7);
    }

    .tag-chip-del {
      background: none;
      border: none;
      color: rgba(255,255,255,0.35);
      font-size: 1.2rem;
      line-height: 1;
      padding: 0;
      cursor: pointer;
      transition: color 0.2s;
    }

    .tag-chip-del:hover { color: rgba(220,50,50,0.9); }

    .tag-input-field {
      background: none;
      border: none;
      color: #fff;
      font-family: inherit;
      font-size: 1.2rem;
      font-weight: 300;
      outline: none;
      min-width: 12rem;
      flex: 1;
      padding: 0.2rem 0;
    }

    .tag-hint {
      font-size: 1rem;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.18);
      margin-top: 0.6rem;
    }

    /* =====================================================================
       SKILL CATEGORY BLOCK
    ===================================================================== */
    .skill-cat-block {
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.02);
      padding: 2.4rem;
      margin-bottom: 2rem;
    }

    .skill-cat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.6rem;
    }

    .skill-cat-header .form-input {
      font-size: 1rem;
      letter-spacing: 0.3em;
      width: auto;
      flex: 1;
      margin-right: 1.2rem;
      padding: 0.6rem 1rem;
    }

    /* =====================================================================
       WORK BLOCK
    ===================================================================== */
    .work-block {
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.02);
      padding: 2.4rem;
      margin-bottom: 2rem;
    }

    .work-block-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1.4rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .work-block-label { font-size: 1rem; letter-spacing: 0.25em; color: rgba(255,255,255,0.3); }
    .work-block-actions { display: flex; gap: 0.6rem; }

    /* =====================================================================
       ADD BUTTONS
    ===================================================================== */
    .add-btn {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.35);
      background: none;
      border: 1px dashed rgba(255,255,255,0.15);
      padding: 1.2rem 2rem;
      width: 100%;
      justify-content: center;
      transition: color 0.2s, border-color 0.2s;
      margin-top: 0.4rem;
    }

    .add-btn:hover {
      color: rgba(255,255,255,0.7);
      border-color: rgba(255,255,255,0.35);
    }

    /* =====================================================================
       TOAST
    ===================================================================== */
    #toast {
      position: fixed;
      bottom: 3.2rem;
      left: 50%;
      transform: translateX(-50%) translateY(2rem);
      background: #fff;
      color: #000;
      font-size: 1.2rem;
      letter-spacing: 0.15em;
      padding: 1.2rem 2.8rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      z-index: 9999;
      white-space: nowrap;
    }

    #toast.show        { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error       { background: rgb(220,50,50); color: #fff; }
    #toast.loading     { background: #222; color: #fff; }
  </style>
</head>

<body>

  <!-- ===================================================================
       HEADER
  ==================================================================== -->
  <header class="admin-header">
    <div class="admin-logo">
      <span>ADMIN &nbsp;·&nbsp; <strong>PORTFOLIO EDITOR</strong></span>
      <div class="gh-status" id="gh-status">
        <div class="gh-dot" id="gh-dot"></div>
        <span class="gh-status-label" id="gh-status-label">未接続</span>
      </div>
    </div>
    <div class="admin-actions">
      <button class="btn btn-primary" id="btn-save">SAVE TO GITHUB</button>
      <button class="btn" id="btn-export">EXPORT JSON</button>
      <label class="btn-import" for="import-file">IMPORT JSON</label>
      <input type="file" id="import-file" accept=".json" hidden>
      <a href="index.html" target="_blank" class="btn">PREVIEW ↗</a>
    </div>
  </header>

  <!-- ===================================================================
       BODY
  ==================================================================== -->
  <div class="admin-body">

    <!-- SIDEBAR -->
    <aside class="admin-sidebar">
      <button class="tab-btn active" data-tab="profile">PROFILE</button>
      <button class="tab-btn" data-tab="skills">SKILLS</button>
      <button class="tab-btn" data-tab="works">WORKS</button>
      <button class="tab-btn" data-tab="contact">CONTACT</button>
      <button class="tab-btn settings-btn" data-tab="settings">⚙ SETTINGS</button>
    </aside>

    <!-- MAIN -->
    <main class="admin-main">

      <!-- PROFILE -->
      <section class="tab-pane active" id="tab-profile">
        <h2 class="form-section-title">PROFILE</h2>

        <div class="form-group">
          <label class="form-label">NAME (ENGLISH)</label>
          <input class="form-input" id="p-nameEn" type="text" placeholder="KAITO KANBE">
        </div>
        <div class="form-group">
          <label class="form-label">NAME (JAPANESE)</label>
          <input class="form-input" id="p-nameJa" type="text" placeholder="神部 凱斗">
        </div>
        <div class="form-group">
          <label class="form-label">TITLE / ROLE</label>
          <input class="form-input" id="p-title" type="text" placeholder="AI ENGINEER / DEVELOPER">
        </div>
        <div class="form-group">
          <label class="form-label">LOCATION (HERO)</label>
          <input class="form-input" id="p-location" type="text" placeholder="HIROO, HOKKAIDO — JAPAN">
        </div>
        <div class="form-group">
          <label class="form-label">LOCATION (JAPANESE)</label>
          <input class="form-input" id="p-locationJa" type="text" placeholder="北海道 広尾町">
        </div>
        <div class="form-group">
          <label class="form-label">BIO PARAGRAPHS <small>HTMLタグ使用可 (&lt;strong&gt; など)</small></label>
          <div class="bio-list" id="bio-list"></div>
          <button class="add-btn" id="add-bio">＋ 段落を追加</button>
        </div>
      </section>

      <!-- SKILLS -->
      <section class="tab-pane" id="tab-skills">
        <h2 class="form-section-title">SKILLS</h2>
        <div id="skills-cats"></div>
        <button class="add-btn" id="add-cat">＋ カテゴリを追加</button>
      </section>

      <!-- WORKS -->
      <section class="tab-pane" id="tab-works">
        <h2 class="form-section-title">WORKS</h2>
        <div id="works-list"></div>
        <button class="add-btn" id="add-work">＋ 作品を追加</button>
      </section>

      <!-- CONTACT -->
      <section class="tab-pane" id="tab-contact">
        <h2 class="form-section-title">CONTACT</h2>
        <div class="form-group">
          <label class="form-label">LEAD TEXT</label>
          <textarea class="form-textarea" id="c-lead" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">EMAIL</label>
          <input class="form-input" id="c-email" type="email" placeholder="hello@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">GITHUB URL</label>
          <input class="form-input" id="c-github" type="url" placeholder="https://github.com/username">
        </div>
        <div class="form-group">
          <label class="form-label">X / TWITTER URL</label>
          <input class="form-input" id="c-twitter" type="url" placeholder="https://x.com/username">
        </div>
        <div class="form-group">
          <label class="form-label">LINKEDIN URL</label>
          <input class="form-input" id="c-linkedin" type="url" placeholder="https://linkedin.com/in/username">
        </div>
      </section>

      <!-- SETTINGS -->
      <section class="tab-pane" id="tab-settings">
        <h2 class="form-section-title">GITHUB SETTINGS</h2>

        <div class="settings-banner none" id="settings-banner">
          <div class="dot"></div>
          <span class="settings-banner-text" id="settings-banner-text">GitHub との接続を設定してください</span>
        </div>

        <div class="form-group">
          <label class="form-label">GITHUB USERNAME</label>
          <input class="form-input" id="gh-owner" type="text" placeholder="your-username">
        </div>
        <div class="form-group">
          <label class="form-label">REPOSITORY NAME</label>
          <input class="form-input" id="gh-repo" type="text" placeholder="my-portfolio">
        </div>
        <div class="form-group">
          <label class="form-label">BRANCH</label>
          <input class="form-input" id="gh-branch" type="text" placeholder="main" value="main">
        </div>
        <div class="form-group">
          <label class="form-label">
            PERSONAL ACCESS TOKEN
            <small>repo スコープが必要</small>
          </label>
          <input class="form-input" id="gh-token" type="password" autocomplete="off" placeholder="ghp_xxxxxxxxxxxxxxxx">
          <p class="form-hint">
            GitHub → Settings → Developer settings → Personal access tokens → Tokens (classic)<br>
            「Generate new token (classic)」で <strong>repo</strong> スコープを選択して発行。<br>
            トークンはこのブラウザの localStorage にのみ保存され、外部に送信されません。
          </p>
        </div>

        <div class="settings-actions">
          <button class="btn btn-primary" id="btn-connect">接続テスト &amp; データ読み込み</button>
          <button class="btn" id="btn-save-settings">設定を保存</button>
        </div>

        <div class="settings-divider"></div>

        <div class="form-group">
          <label class="form-label">DANGER ZONE</label>
          <button class="btn btn-danger" id="btn-reset">デフォルト値にリセット</button>
        </div>
      </section>

    </main>
  </div>

  <div id="toast"></div>

  <script>
  (function () {
    'use strict';

    /* =====================================================================
       CONSTANTS
    ===================================================================== */
    var STORAGE_KEY    = 'kanbe_portfolio';
    var GITHUB_CFG_KEY = 'kanbe_github_config';
    var DATA_PATH      = 'data.json';

    /* =====================================================================
       DEFAULT DATA
    ===================================================================== */
    var DEFAULT_DATA = {
      profile: {
        nameEn: 'KAITO KANBE', nameJa: '神部 凱斗',
        title: 'AI ENGINEER / DEVELOPER',
        location: 'HIROO, HOKKAIDO — JAPAN',
        locationJa: '北海道 広尾町',
        bio: [
          'はじめまして、<strong>神部凱斗（Kaito）</strong>と申します。現在は北海道広尾町の地域おこし協力隊として活動するAIエンジニア・デベロッパーです。',
          '前職の住宅営業では<strong>初年度に全国6位</strong>という成績を収めました。「数字で勝負する現場」で培った思考と行動力を原点に、テクノロジーと地域課題の交差点に大きな可能性を感じ、エンジニアリングの道へと転向しました。',
          '現職では地域の<strong>DX推進とビジネス開発</strong>を主軸に活動しています。求人サイト「広尾しごと」のリニューアルを主導し、AIチャットボットの導入によってユーザーが自然言語で求人を探せる体験を実現。その結果、<strong>月間アクセス数を以前の10倍</strong>に成長させました。',
          'また、デジタル地域通貨「<strong>サプリ</strong>」の運用においても、テクノロジーを活用した地域経済の循環・活性化に貢献しています。ビジネスの現場経験とAIエンジニアリングの力を掛け合わせ、地域と技術をつなぐ新しい価値づくりを目指しています。'
        ]
      },
      skills: {
        categories: [
          { label: 'CAPABILITIES', tags: ['AI Engineering','Chatbot Development','Web Development','DX Promotion','Business Development','Data Analysis','Product Management'] },
          { label: 'TECHNOLOGIES', tags: ['Python','JavaScript','TypeScript','HTML / CSS','Next.js','React','FastAPI','LangChain','LangGraph','OpenAI API','Gemini API','Node.js'] },
          { label: 'LANGUAGES',    tags: ['日本語','English'] }
        ]
      },
      works: [
        { year:'2024', title:'広尾しごと — 求人サイトリニューアル', client:'北海道 広尾町', desc:'地域の求人情報を集約するポータルサイトを全面リニューアル。AIチャットボットを導入し、ユーザーが自然言語で求人を検索・相談できるUXを実現。月間アクセス数を以前の<strong>10倍</strong>に成長させた。', badges:['AI','Web','DX'], url:'', imageUrl:'' },
        { year:'2024', title:'デジタル地域通貨「サプリ」— 運用・開発', client:'北海道 広尾町', desc:'地域経済の循環を促進するデジタル地域通貨の運用と開発に従事。テクノロジーを活用した地域内消費の活性化・利便性向上を推進。', badges:['FinTech','DX'], url:'', imageUrl:'' },
        { year:'2023', title:'広尾町 DX推進支援', client:'北海道 広尾町', desc:'地域おこし協力隊として着任。地方自治体・地域事業者のデジタルトランスフォーメーションを牽引。業務効率化ツールの選定・導入から、デジタルサービスのグランドデザインまで幅広く担当。', badges:['DX','Consulting'], url:'', imageUrl:'' },
        { year:'—2022', title:'住宅営業 — 初年度全国6位', client:'住宅メーカー', desc:'新卒入社の住宅営業職にて初年度から全国6位の成績を達成。顧客との信頼構築・課題解決型の提案力を身につける。この経験が現在のビジネス開発やDX推進の土台となっている。', badges:['Sales','Business'], url:'', imageUrl:'' }
      ],
      contact: {
        lead: 'お仕事のご依頼・ご相談はお気軽にどうぞ。\nOpen to new projects and collaborations.',
        email: '', github: '', twitter: '', linkedin: ''
      }
    };

    /* =====================================================================
       STATE
    ===================================================================== */
    var state      = null;  // 現在の編集データ
    var currentSha = null;  // GitHub 上の data.json の sha（更新時に必要）

    /* =====================================================================
       GITHUB CONFIG
    ===================================================================== */
    function getGhConfig() {
      try { return JSON.parse(localStorage.getItem(GITHUB_CFG_KEY)) || {}; }
      catch (_) { return {}; }
    }

    function saveGhConfig(cfg) {
      localStorage.setItem(GITHUB_CFG_KEY, JSON.stringify(cfg));
    }

    function readGhForm() {
      return {
        owner  : document.getElementById('gh-owner').value.trim(),
        repo   : document.getElementById('gh-repo').value.trim(),
        branch : document.getElementById('gh-branch').value.trim() || 'main',
        token  : document.getElementById('gh-token').value.trim()
      };
    }

    function fillGhForm(cfg) {
      document.getElementById('gh-owner').value  = cfg.owner  || '';
      document.getElementById('gh-repo').value   = cfg.repo   || '';
      document.getElementById('gh-branch').value = cfg.branch || 'main';
      document.getElementById('gh-token').value  = cfg.token  || '';
    }

    /* =====================================================================
       GITHUB API
    ===================================================================== */
    function ghHeaders(token) {
      return {
        'Authorization': 'token ' + token,
        'Accept'       : 'application/vnd.github.v3+json',
        'Content-Type' : 'application/json'
      };
    }

    /* ファイル取得 → { data: object, sha: string } */
    function ghGetFile(cfg, path) {
      var url = 'https://api.github.com/repos/' + cfg.owner + '/' + cfg.repo +
                '/contents/' + path + '?ref=' + cfg.branch;
      return fetch(url, { headers: ghHeaders(cfg.token) })
        .then(function (res) {
          if (res.status === 404) return null;         // ファイルなし
          if (!res.ok) return res.json().then(function (e) { throw new Error(e.message || 'API error ' + res.status); });
          return res.json();
        })
        .then(function (json) {
          if (!json) return null;
          var raw = json.content.replace(/\n/g, '');
          var decoded = decodeURIComponent(
            Array.from(atob(raw)).map(function (c) {
              return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join('')
          );
          return { data: JSON.parse(decoded), sha: json.sha };
        });
    }

    /* ファイル作成 / 更新 */
    function ghPutFile(cfg, path, content, sha, message) {
      var jsonStr = JSON.stringify(content, null, 2);
      /* 日本語を含む UTF-8 → Base64 */
      var b64 = btoa(
        encodeURIComponent(jsonStr).replace(/%([0-9A-F]{2})/g, function (_, p1) {
          return String.fromCharCode(parseInt(p1, 16));
        })
      );

      var body = { message: message || 'Update portfolio data', content: b64, branch: cfg.branch };
      if (sha) body.sha = sha;

      var url = 'https://api.github.com/repos/' + cfg.owner + '/' + cfg.repo + '/contents/' + path;
      return fetch(url, {
        method  : 'PUT',
        headers : ghHeaders(cfg.token),
        body    : JSON.stringify(body)
      }).then(function (res) {
        if (!res.ok) return res.json().then(function (e) { throw new Error(e.message || 'API error ' + res.status); });
        return res.json();
      });
    }

    /* =====================================================================
       STATUS UI
    ===================================================================== */
    function setGhStatus(status, label) {
      /* status: 'none' | 'connecting' | 'connected' | 'error' */
      var dot    = document.getElementById('gh-dot');
      var lbl    = document.getElementById('gh-status-label');
      var banner = document.getElementById('settings-banner');
      var bannerTxt = document.getElementById('settings-banner-text');

      dot.className = 'gh-dot ' + status;
      lbl.textContent = label;

      banner.className = 'settings-banner ' + (status === 'connected' ? 'ok' : status === 'error' ? 'err' : 'none');
      bannerTxt.innerHTML = label;
    }

    /* =====================================================================
       CONNECT — テスト接続 & データ読み込み
    ===================================================================== */
    document.getElementById('btn-connect').addEventListener('click', function () {
      var cfg = readGhForm();
      if (!cfg.owner || !cfg.repo || !cfg.token) {
        toast('⚠ Owner・Repo・Token を入力してください', true);
        return;
      }

      setGhStatus('connecting', '接続中...');
      var btn = document.getElementById('btn-connect');
      btn.disabled = true;

      ghGetFile(cfg, DATA_PATH)
        .then(function (result) {
          if (result) {
            currentSha = result.sha;
            state = result.data;
            renderAll(state);
            setGhStatus('connected',
              '<strong>' + cfg.owner + '/' + cfg.repo + '</strong> — data.json を読み込みました');
            toast('✓ 接続成功。データを読み込みました');
          } else {
            /* data.json がまだない */
            currentSha = null;
            setGhStatus('connected',
              '<strong>' + cfg.owner + '/' + cfg.repo + '</strong> — 接続OK（data.json は未作成）');
            toast('接続成功。SAVE で data.json を作成します');
          }
          saveGhConfig(cfg);
        })
        .catch(function (err) {
          setGhStatus('error', '接続失敗: ' + err.message);
          toast('⚠ ' + err.message, true);
        })
        .finally(function () { btn.disabled = false; });
    });

    /* 設定を保存（接続テストなし） */
    document.getElementById('btn-save-settings').addEventListener('click', function () {
      var cfg = readGhForm();
      saveGhConfig(cfg);
      toast('✓ 設定を保存しました');
    });

    /* =====================================================================
       SAVE TO GITHUB
    ===================================================================== */
    document.getElementById('btn-save').addEventListener('click', function () {
      var cfg = getGhConfig();
      if (!cfg.token || !cfg.owner || !cfg.repo) {
        toast('⚠ まず SETTINGS で GitHub 設定を行ってください', true);
        switchTab('settings');
        return;
      }

      collectState();

      var btn = document.getElementById('btn-save');
      btn.textContent = 'SAVING...';
      btn.disabled    = true;
      toast('GitHub に保存中...', false, true);

      ghPutFile(cfg, DATA_PATH, state, currentSha, 'Update portfolio data')
        .then(function (res) {
          currentSha = res.content.sha;
          /* ローカルキャッシュも更新 */
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
          setGhStatus('connected',
            '<strong>' + cfg.owner + '/' + cfg.repo + '</strong> — 保存済み');
          toast('✓ GitHubに保存しました。数秒で公開サイトに反映されます');
        })
        .catch(function (err) {
          toast('⚠ 保存失敗: ' + err.message, true);
        })
        .finally(function () {
          btn.textContent = 'SAVE TO GITHUB';
          btn.disabled    = false;
        });
    });

    /* =====================================================================
       EXPORT JSON
    ===================================================================== */
    document.getElementById('btn-export').addEventListener('click', function () {
      collectState();
      var blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
      var url  = URL.createObjectURL(blob);
      var a    = document.createElement('a');
      a.href = url; a.download = 'portfolio-data.json'; a.click();
      URL.revokeObjectURL(url);
      toast('✓ JSONをダウンロードしました');
    });

    /* =====================================================================
       IMPORT JSON
    ===================================================================== */
    document.getElementById('import-file').addEventListener('change', function (e) {
      var file = e.target.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function (ev) {
        try {
          state = JSON.parse(ev.target.result);
          renderAll(state);
          toast('✓ インポートしました。SAVE で GitHub に反映してください');
        } catch (_) {
          toast('⚠ JSONの読み込みに失敗しました', true);
        }
        e.target.value = '';
      };
      reader.readAsText(file);
    });

    /* =====================================================================
       RESET
    ===================================================================== */
    document.getElementById('btn-reset').addEventListener('click', function () {
      if (!confirm('デフォルト値にリセットしますか？\n現在の内容は失われます。')) return;
      state = JSON.parse(JSON.stringify(DEFAULT_DATA));
      currentSha = null;
      renderAll(state);
      toast('リセットしました。SAVE で GitHub に反映してください');
    });

    /* =====================================================================
       TABS
    ===================================================================== */
    function switchTab(tabId) {
      document.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('active'); });
      document.querySelectorAll('.tab-pane').forEach(function (p) { p.classList.remove('active'); });
      var btn = document.querySelector('.tab-btn[data-tab="' + tabId + '"]');
      if (btn) btn.classList.add('active');
      var pane = document.getElementById('tab-' + tabId);
      if (pane) pane.classList.add('active');
    }

    document.querySelectorAll('.tab-btn').forEach(function (btn) {
      btn.addEventListener('click', function () { switchTab(btn.dataset.tab); });
    });

    /* =====================================================================
       TOAST
    ===================================================================== */
    var toastTimer;

    function toast(msg, isError, isLoading) {
      var el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'show' + (isError ? ' error' : isLoading ? ' loading' : '');
      clearTimeout(toastTimer);
      if (!isLoading) {
        toastTimer = setTimeout(function () { el.className = ''; }, 3200);
      }
    }

    /* =====================================================================
       RENDER FORMS
    ===================================================================== */
    function renderAll(data) {
      renderProfile(data.profile);
      renderSkills(data.skills);
      renderWorks(data.works);
      renderContact(data.contact);
    }

    /* ---- Profile ---- */
    function renderProfile(p) {
      document.getElementById('p-nameEn').value     = p.nameEn     || '';
      document.getElementById('p-nameJa').value     = p.nameJa     || '';
      document.getElementById('p-title').value      = p.title      || '';
      document.getElementById('p-location').value   = p.location   || '';
      document.getElementById('p-locationJa').value = p.locationJa || '';
      renderBioList(p.bio || []);
    }

    function renderBioList(arr) {
      var list = document.getElementById('bio-list');
      list.innerHTML = '';
      arr.forEach(function (text) { appendBioItem(text); });
    }

    function appendBioItem(text) {
      var list = document.getElementById('bio-list');
      var item = document.createElement('div');
      item.className = 'bio-item';
      item.innerHTML =
        '<textarea class="form-textarea bio-textarea" rows="3">' + escTa(text) + '</textarea>' +
        '<div class="bio-item-controls">' +
        '  <button class="icon-btn bio-up" title="上へ">↑</button>' +
        '  <button class="icon-btn bio-dn" title="下へ">↓</button>' +
        '  <button class="icon-btn danger bio-del" title="削除">✕</button>' +
        '</div>';

      item.querySelector('.bio-up').addEventListener('click', function () {
        if (item.previousElementSibling) list.insertBefore(item, item.previousElementSibling);
      });
      item.querySelector('.bio-dn').addEventListener('click', function () {
        if (item.nextElementSibling) list.insertBefore(item.nextElementSibling, item);
      });
      item.querySelector('.bio-del').addEventListener('click', function () {
        if (list.querySelectorAll('.bio-item').length > 1) item.remove();
        else toast('最低1段落必要です', true);
      });
      list.appendChild(item);
    }

    document.getElementById('add-bio').addEventListener('click', function () {
      appendBioItem('');
      var textareas = document.querySelectorAll('.bio-textarea');
      textareas[textareas.length - 1].focus();
    });

    /* ---- Skills ---- */
    function renderSkills(s) {
      var container = document.getElementById('skills-cats');
      container.innerHTML = '';
      (s.categories || []).forEach(function (cat) { appendSkillCat(cat); });
    }

    function appendSkillCat(cat) {
      var container = document.getElementById('skills-cats');
      var block = document.createElement('div');
      block.className = 'skill-cat-block';
      block.innerHTML =
        '<div class="skill-cat-header">' +
        '  <input class="form-input cat-label-input" type="text" value="' + escAttr(cat.label) + '" placeholder="カテゴリ名">' +
        '  <button class="icon-btn danger cat-del" title="削除">✕</button>' +
        '</div>' +
        '<div class="tag-block cat-tag-block">' +
        (cat.tags || []).map(tagChipHtml).join('') +
        '  <input class="tag-input-field" type="text" placeholder="タグを入力して Enter">' +
        '</div>' +
        '<p class="tag-hint">Enter または , で追加</p>';

      block.querySelector('.cat-del').addEventListener('click', function () {
        if (document.querySelectorAll('.skill-cat-block').length > 1) block.remove();
        else toast('最低1カテゴリ必要です', true);
      });
      wireTagBlock(block.querySelector('.cat-tag-block'), 'cat-tag-val');
      container.appendChild(block);
    }

    function tagChipHtml(t) {
      return '<span class="tag-chip">' +
        '<input type="hidden" class="cat-tag-val" value="' + escAttr(t) + '">' +
        '<span>' + escHtml(t) + '</span>' +
        '<button class="tag-chip-del" type="button">×</button></span>';
    }

    document.getElementById('add-cat').addEventListener('click', function () {
      appendSkillCat({ label: 'NEW CATEGORY', tags: [] });
    });

    /* ---- Works ---- */
    function renderWorks(works) {
      var list = document.getElementById('works-list');
      list.innerHTML = '';
      (works || []).forEach(function (w) { appendWork(w); });
    }

    function appendWork(w) {
      var list  = document.getElementById('works-list');
      var block = document.createElement('div');
      block.className = 'work-block';
      block.innerHTML =
        '<div class="work-block-header">' +
        '  <span class="work-block-label">WORK</span>' +
        '  <div class="work-block-actions">' +
        '    <button class="icon-btn w-up" title="上へ">↑</button>' +
        '    <button class="icon-btn w-dn" title="下へ">↓</button>' +
        '    <button class="icon-btn danger w-del" title="削除">✕</button>' +
        '  </div>' +
        '</div>' +
        '<div class="form-row">' +
        '  <div class="form-group"><label class="form-label">YEAR</label>' +
        '    <input class="form-input w-year" type="text" value="' + escAttr(w.year || '') + '" placeholder="2024"></div>' +
        '  <div class="form-group"><label class="form-label">TITLE</label>' +
        '    <input class="form-input w-title" type="text" value="' + escAttr(w.title || '') + '" placeholder="作品名"></div>' +
        '</div>' +
        '<div class="form-group"><label class="form-label">CLIENT</label>' +
        '  <input class="form-input w-client" type="text" value="' + escAttr(w.client || '') + '" placeholder="クライアント"></div>' +
        '<div class="form-group"><label class="form-label">DESCRIPTION <small>HTMLタグ使用可</small></label>' +
        '  <textarea class="form-textarea w-desc" rows="4">' + escTa(w.desc || '') + '</textarea></div>' +
        '<div class="form-group"><label class="form-label">URL <small>空白でリンクなし</small></label>' +
        '  <input class="form-input w-url" type="url" value="' + escAttr(w.url || '') + '" placeholder="https://..."></div>' +
        '<div class="form-group"><label class="form-label">THUMBNAIL IMAGE URL <small>空白で非表示</small></label>' +
        '  <input class="form-input w-imageUrl" type="url" value="' + escAttr(w.imageUrl || '') + '" placeholder="https://... または images/screenshot.jpg"></div>' +
        '<div class="form-group"><label class="form-label">BADGES</label>' +
        '  <div class="tag-block w-badge-block">' +
        (w.badges || []).map(badgeChipHtml).join('') +
        '    <input class="tag-input-field" type="text" placeholder="バッジを入力して Enter">' +
        '  </div><p class="tag-hint">Enter または , で追加</p></div>';

      block.querySelector('.w-up').addEventListener('click', function () {
        if (block.previousElementSibling) list.insertBefore(block, block.previousElementSibling);
      });
      block.querySelector('.w-dn').addEventListener('click', function () {
        if (block.nextElementSibling) list.insertBefore(block.nextElementSibling, block);
      });
      block.querySelector('.w-del').addEventListener('click', function () {
        if (list.querySelectorAll('.work-block').length > 1) block.remove();
        else toast('最低1件必要です', true);
      });
      wireTagBlock(block.querySelector('.w-badge-block'), 'w-badge-val');
      list.appendChild(block);
    }

    function badgeChipHtml(b) {
      return '<span class="tag-chip">' +
        '<input type="hidden" class="w-badge-val" value="' + escAttr(b) + '">' +
        '<span>' + escHtml(b) + '</span>' +
        '<button class="tag-chip-del" type="button">×</button></span>';
    }

    document.getElementById('add-work').addEventListener('click', function () {
      appendWork({ year: String(new Date().getFullYear()), title: '', client: '', desc: '', badges: [], url: '', imageUrl: '' });
      /* 新しいブロックまでスクロール */
      var blocks = document.querySelectorAll('.work-block');
      blocks[blocks.length - 1].scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    /* ---- Contact ---- */
    function renderContact(c) {
      document.getElementById('c-lead').value     = c.lead     || '';
      document.getElementById('c-email').value    = c.email    || '';
      document.getElementById('c-github').value   = c.github   || '';
      document.getElementById('c-twitter').value  = c.twitter  || '';
      document.getElementById('c-linkedin').value = c.linkedin || '';
    }

    /* =====================================================================
       TAG BLOCK WIRING (共通)
    ===================================================================== */
    function wireTagBlock(tagBlock, valClass) {
      tagBlock.querySelectorAll('.tag-chip-del').forEach(function (btn) {
        btn.addEventListener('click', function () { btn.closest('.tag-chip').remove(); });
      });
      var input = tagBlock.querySelector('.tag-input-field');
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); addTagToBlock(tagBlock, input, valClass); }
      });
      input.addEventListener('blur', function () {
        if (input.value.trim()) addTagToBlock(tagBlock, input, valClass);
      });
    }

    function addTagToBlock(tagBlock, input, valClass) {
      var val = input.value.replace(/,/g, '').trim();
      if (!val) return;
      var chip = document.createElement('span');
      chip.className = 'tag-chip';
      chip.innerHTML =
        '<input type="hidden" class="' + valClass + '" value="' + escAttr(val) + '">' +
        '<span>' + escHtml(val) + '</span>' +
        '<button class="tag-chip-del" type="button">×</button>';
      chip.querySelector('.tag-chip-del').addEventListener('click', function () { chip.remove(); });
      tagBlock.insertBefore(chip, input);
      input.value = '';
    }

    /* =====================================================================
       COLLECT STATE FROM FORMS
    ===================================================================== */
    function collectState() {
      state.profile.nameEn     = document.getElementById('p-nameEn').value;
      state.profile.nameJa     = document.getElementById('p-nameJa').value;
      state.profile.title      = document.getElementById('p-title').value;
      state.profile.location   = document.getElementById('p-location').value;
      state.profile.locationJa = document.getElementById('p-locationJa').value;
      state.profile.bio        = Array.from(document.querySelectorAll('.bio-textarea')).map(function (t) { return t.value; });

      state.skills.categories  = Array.from(document.querySelectorAll('.skill-cat-block')).map(function (b) {
        return {
          label: b.querySelector('.cat-label-input').value,
          tags:  Array.from(b.querySelectorAll('.cat-tag-val')).map(function (i) { return i.value; })
        };
      });

      state.works = Array.from(document.querySelectorAll('.work-block')).map(function (b) {
        return {
          year    : b.querySelector('.w-year').value,
          title   : b.querySelector('.w-title').value,
          client  : b.querySelector('.w-client').value,
          desc    : b.querySelector('.w-desc').value,
          url     : b.querySelector('.w-url').value,
          imageUrl: b.querySelector('.w-imageUrl').value,
          badges  : Array.from(b.querySelectorAll('.w-badge-val')).map(function (i) { return i.value; })
        };
      });

      state.contact.lead     = document.getElementById('c-lead').value;
      state.contact.email    = document.getElementById('c-email').value;
      state.contact.github   = document.getElementById('c-github').value;
      state.contact.twitter  = document.getElementById('c-twitter').value;
      state.contact.linkedin = document.getElementById('c-linkedin').value;
    }

    /* =====================================================================
       ESCAPE HELPERS
    ===================================================================== */
    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function escAttr(s) { return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
    function escTa(s)   { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    /* =====================================================================
       INIT
    ===================================================================== */
    /* localStorage キャッシュ or デフォルトでフォームを初期表示 */
    (function () {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        state   = raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(DEFAULT_DATA));
      } catch (_) {
        state   = JSON.parse(JSON.stringify(DEFAULT_DATA));
      }
      renderAll(state);

      /* 保存済み GitHub 設定を読み込んでフォームに反映 */
      var cfg = getGhConfig();
      if (cfg.owner) {
        fillGhForm(cfg);
        /* 自動接続は行わず、状態だけ表示 */
        setGhStatus('none',
          'SETTINGS に設定済み。「接続テスト」で接続してください。');
      }
    }());

  }());
  </script>
