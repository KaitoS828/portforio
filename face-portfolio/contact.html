      --grey-1: #a0a0a0;

    html { scroll-behavior: smooth; }

    .contact-page {
      max-width: 640px;

    .back-btn {
      position: fixed;
      top: 32px;

      align-items: center;
      gap: 8px;
      color: var(--grey-1);
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.3s ease;
      z-index: 100;
    }
    .back-btn:hover { color: var(--white); }

    .contact-page .section-label {
      display: block;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--grey-2);
      margin-bottom: 20px;
    }

    .contact-page h1 {
      font-size: clamp(2.2rem, 5vw, 3.4rem);
      font-weight: 300;
      line-height: 1.15;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }

    .contact-page h1 em {
      font-style: italic;
      color: var(--grey-1);
    }

    .contact-page .subtitle {
      color: var(--grey-1);
      font-size: 0.9rem;
      font-weight: 300;
      line-height: 1.9;
      margin-bottom: 56px;
    }

    .contact-form { display: flex; flex-direction: column; gap: 24px; }

    .form-group { display: flex; flex-direction: column; gap: 8px; }

    .form-group label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--grey-2);
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      background: rgba(255,255,255,0.03);

      font-size: 0.9rem;
      font-weight: 300;
      font-family: inherit;
      outline: none;
      transition: border-color 0.3s ease;
      border-radius: 0;
      -webkit-appearance: none;

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: var(--cyan);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 160px;
      line-height: 1.7;
    }

    .form-group select option {
      background: #1a0030;

    }

    .form-submit {
      margin-top: 8px;
    }

      background: var(--white);
      color: #05000f;

      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: opacity 0.3s ease, transform 0.3s ease;
      font-family: inherit;
      width: 100%;
    }
    .btn-submit:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .form-note {

<body>

  <div class="cursor"></div>

  <a href="index.html" class="back-btn">

  <div class="lang-toggle fixed-lang-toggle">
    <button class="lang-btn" data-lang="ja" onclick="switchLang('ja')">JP</button>
    <span class="lang-sep"> / </span>
    <button class="lang-btn" data-lang="en" onclick="switchLang('en')">EN</button>
  </div>

  <div class="contact-page">
    <span class="section-label">Contact</span>
    <h1>Let's Create<br><em>Something Together</em></h1>
    <p class="subtitle" id="js-subtitle">新しいプロジェクト・コラボレーション・お仕事のご依頼など、<br>お気軽にご連絡ください。通常1〜2営業日以内にご返信します。</p>

    <form class="contact-form" id="contactForm">
      <div class="form-group">
        <label for="name" id="label-name">お名前 *</label>
        <input type="text" id="name" name="name" placeholder="山田 太郎" required>
      </div>

      <div class="form-group">
        <label for="email" id="label-email">メールアドレス *</label>
        <input type="email" id="email" name="email" placeholder="example@email.com" required>
      </div>

      <div class="form-group">
        <label for="category" id="label-category">お問い合わせ種別</label>
        <select id="category" name="category">
          <option value="" id="opt-default">選択してください</option>
          <option value="work" id="opt-work">お仕事のご依頼</option>
          <option value="collaboration" id="opt-collab">コラボレーション</option>
          <option value="dx" id="opt-dx">DX・システム相談</option>
          <option value="lp" id="opt-lp">HP・LP制作</option>
          <option value="other" id="opt-other">その他</option>
        </select>
      </div>

      <div class="form-group">
        <label for="message" id="label-message">メッセージ *</label>
        <textarea id="message" name="message" placeholder="お気軽にご記入ください。" required></textarea>
      </div>

      <div class="form-submit">
        <button type="submit" class="btn-submit" id="submitBtn">送信する</button>
      </div>
      <p class="form-note" id="js-form-note">送信後、kaito.sekimoto8@gmail.com より返信いたします。</p>
    </form>

    <div class="form-success" id="formSuccess">
      <h2 id="js-success-title">送信しました。</h2>
      <p id="js-success-body">お問い合わせありがとうございます。<br>1〜2営業日以内にご返信いたします。</p>
      <a href="index.html" id="js-success-link">← ポートフォリオに戻る</a>
    </div>

    <hr class="divider">

    <div class="direct-contact">
      <h3>Direct Contact</h3>
      <div class="direct-links">
        <a href="mailto:kaito.sekimoto8@gmail.com" class="direct-link">
          <span>✉</span> kaito.sekimoto8@gmail.com
        </a>
        <a href="https://github.com/KaitoS828" target="_blank" class="direct-link">
          <span>⌘</span> GitHub
        </a>
      </div>
    </div>
  </div>

  <script>
    // ===== Language =====
    function getLang() { return localStorage.getItem('lang') || 'ja'; }
    function switchLang(l) { localStorage.setItem('lang', l); location.reload(); }
    document.querySelectorAll('.lang-btn[data-lang]').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === getLang());
    });
    if (getLang() === 'en') {
      document.getElementById('js-subtitle').innerHTML = 'Open to new projects, collaborations, and freelance work.<br>I\'ll get back to you within 1–2 business days.';
      document.getElementById('label-name').textContent = 'Name *';
      document.getElementById('label-email').textContent = 'Email *';
      document.getElementById('label-category').textContent = 'Inquiry Type';
      document.getElementById('opt-default').textContent = 'Please select';
      document.getElementById('opt-work').textContent = 'Project / Work Request';
      document.getElementById('opt-collab').textContent = 'Collaboration';
      document.getElementById('opt-dx').textContent = 'DX / Systems Consulting';
      document.getElementById('opt-lp').textContent = 'Website / LP Production';
      document.getElementById('opt-other').textContent = 'Other';
      document.getElementById('label-message').textContent = 'Message *';
      document.getElementById('message').placeholder = 'Feel free to write anything.';
      document.getElementById('submitBtn').textContent = 'Send';
      document.getElementById('js-form-note').textContent = 'After submitting, you\'ll receive a reply from kaito.sekimoto8@gmail.com.';
      document.getElementById('js-success-title').textContent = 'Message Sent.';
      document.getElementById('js-success-body').innerHTML = 'Thank you for reaching out.<br>I\'ll get back to you within 1–2 business days.';
      document.getElementById('js-success-link').textContent = '← Back to Portfolio';
      document.getElementById('name').placeholder = 'John Doe';
    }

    // Cursor
    const cursorEl = document.querySelector('.cursor');
    const trailEl  = document.querySelector('.cursor-trail');
    let mx = 0, my = 0, tx = 0, ty = 0;
    document.addEventListener('mousemove', (e) => {
      mx = e.clientX; my = e.clientY;
      if (cursorEl) { cursorEl.style.left = mx + 'px'; cursorEl.style.top = my + 'px'; }
    });
    (function loop() {
      tx += (mx - tx) * 0.12; ty += (my - ty) * 0.12;
      if (trailEl) { trailEl.style.left = tx + 'px'; trailEl.style.top = ty + 'px'; }
      requestAnimationFrame(loop);
    })();

    // Form: Formspree送信
    const form = document.getElementById('contactForm');
    const successEl = document.getElementById('formSuccess');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = getLang() === 'en' ? 'Sending...' : '送信中...';

      const data = {
        name:     form.name.value,
        email:    form.email.value,
        category: form.category.value,
        message:  form.message.value,
      };

      // Formspree endpoint (要設定: https://formspree.io/f/YOUR_ID)
      const ENDPOINT = 'https://formspree.io/f/xpwzddqg';

      try {
        const res = await fetch(ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: JSON.stringify(data),
        });
        if (res.ok) {
          form.style.display = 'none';
          successEl.style.display = 'block';
        } else {
          throw new Error();
        }
      } catch {
        const isEn = getLang() === 'en';
        alert(isEn ? 'Failed to send. Please contact directly at kaito.sekimoto8@gmail.com.' : '送信に失敗しました。直接メール（kaito.sekimoto8@gmail.com）よりご連絡ください。');
        submitBtn.disabled = false;
        submitBtn.textContent = isEn ? 'Send' : '送信する';
      }
    });
  </script>
