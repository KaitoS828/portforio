  <article style="padding:40px;max-width:800px;margin:0 auto;font-family:sans-serif;color:#fff;background:#05000f">
    <h1>Remotion Video — Reactでコードから動画を生成する</h1>
    <p><strong>作成者:</strong> 神部凱斗 (Kanbe Kaito) | <strong>Role:</strong> Frontend Engineer | <strong>Year:</strong> 2025 | <strong>Type:</strong> Personal Project</p>
    <h2>概要</h2>
    <p>Remotion を使用し、React コンポーネントとして動画を制作するプロジェクト。アニメーション・テキスト・音声をプログラマブルに組み合わせ、コードから映像表現を実現します。</p>
    <h2>主な機能</h2>
    <ul>
      <li>React コンポーネントで動画構成を定義</li>
      <li>フレーム単位のアニメーション制御</li>
      <li>VOICEVOX との音声連携テンプレート</li>
      <li>タイムライン管理と素材の合成</li>
      <li>MP4 エクスポート対応</li>
    </ul>
    <h2>技術ハイライト</h2>
    <ul>
      <li>Remotion の interpolate / spring API を活用</li>
      <li>useCurrentFrame でフレーム同期アニメーション</li>
      <li>Sequence コンポーネントでシーン管理</li>
      <li>Node.js API でレンダリングジョブ管理</li>
    </ul>
    <h2>技術スタック</h2>
    <p>Remotion / React / TypeScript / VOICEVOX / Node.js / Tailwind CSS</p>
