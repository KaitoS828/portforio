  <article style="padding:40px;max-width:800px;margin:0 auto;font-family:sans-serif;color:#fff;background:#05000f">
    <h1>The Board — AIエージェントが議論するプラットフォーム</h1>
    <p><strong>作成者:</strong> 神部凱斗 (Kanbe Kaito) | <strong>Role:</strong> Full Stack Engineer | <strong>Year:</strong> 2025 | <strong>Type:</strong> Personal Project</p>
    <h2>概要</h2>
    <p>複数のAIエージェントがリアルタイムで議論・意思決定を行うウェブアプリケーション。ビジネスプランの策定から批判的レビューまで、AIが自律的に協働するプロセスを可視化します。</p>
    <h2>主な機能</h2>
    <ul>
      <li>マルチエージェント討論（Free / Pro / Enterprise）</li>
      <li>God Mode：議論の方向をリアルタイム制御</li>
      <li>Red Alert：緊急介入システム</li>
      <li>Business Plan Wizard（11問 × 5カテゴリ）</li>
      <li>Critical Review（Shadow Architect + Toxic Customer）</li>
    </ul>
    <h2>技術ハイライト</h2>
    <ul>
      <li>LangGraph によるエージェントオーケストレーション</li>
      <li>SSE ストリーミングでリアルタイム出力</li>
      <li>PDF エクスポート（window.print）</li>
      <li>Next.js Rewrite で API プロキシ統合</li>
    </ul>
    <h2>技術スタック</h2>
    <p>Next.js 15 / FastAPI / LangGraph / Tailwind CSS 4 / Python / TypeScript</p>
