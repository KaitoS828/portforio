  <article style="padding:40px;max-width:800px;margin:0 auto;font-family:sans-serif;color:#fff;background:#05000f">
    <h1>Knowledge Nexus — エンジニアのための「第2の脳」</h1>
    <p><strong>作成者:</strong> 神部凱斗 (Kanbe Kaito) | <strong>Role:</strong> Full Stack Engineer | <strong>Year:</strong> 2025 | <strong>Type:</strong> Personal Project</p>
    <h2>概要</h2>
    <p>URLやPDFをGemini AIが自動解析・要約し、クイズ生成・ナレッジグラフ・学習ダイアリーで知識の定着を加速させるAI知識管理プラットフォーム。Supabaseにデータを永続化し、Google/GitHub OAuthで認証を管理します。</p>
    <h2>主な機能</h2>
    <ul>
      <li>URL入力 → Firecrawl APIで自動取得 → Gemini AIで要約・解析</li>
      <li>PDFドキュメント管理：アップロード・テキスト抽出・AI分析</li>
      <li>能動的学習：クイズ生成・リトライ機能・教えるモード</li>
      <li>Brain（知識ベース）：Markdown形式の構造化知識管理・AIリファクタリング</li>
      <li>ナレッジグラフ：知識の関連性の可視化・トレンド検出</li>
    </ul>
    <h2>技術ハイライト</h2>
    <ul>
      <li>Gemini AI（structured output）で記事・PDFを自動構造化</li>
      <li>Firecrawl APIでJSレンダリングページも取得</li>
      <li>Supabase（PostgreSQL）でユーザーデータ永続化</li>
      <li>Google OAuth / GitHub OAuthによる認証</li>
      <li>ナレッジグラフの関連性を可視化</li>
    </ul>
    <h2>技術スタック</h2>
    <p>Vite / React / TypeScript / Gemini API / Firecrawl API / Supabase</p>
    <p><a href="https://github.com/KaitoS828/Knowledge-Nexus">GitHub: github.com/KaitoS828/Knowledge-Nexus</a></p>
