  <article style="padding:40px;max-width:800px;margin:0 auto;font-family:sans-serif;color:#fff;background:#05000f">
    <h1>ID Photo Studio — AIで証明写真をかんたん作成</h1>
    <p><strong>作成者:</strong> 神部凱斗 (Kanbe Kaito) | <strong>Role:</strong> Frontend Engineer | <strong>Year:</strong> 2025 | <strong>Type:</strong> Personal Project</p>
    <h2>概要</h2>
    <p>写真をアップロードするだけで、Gemini AIが背景色変更・スーツ自動着用・各サイズへのトリミングを行う証明写真作成Webアプリ。パスポート・履歴書・マイナンバーカードなど主要サイズに対応し、L判台紙でのダウンロードも可能です。</p>
    <h2>主な機能</h2>
    <ul>
      <li>背景色変更（白・青・グレー）</li>
      <li>スーツ着用：AIが自動でビジネススーツに変換</li>
      <li>サイズプリセット（パスポート / 履歴書 / マイナンバー / 免許 / ビザ）</li>
      <li>台紙ダウンロード（L判、切り取りガイド付き）</li>
      <li>ドラッグ&amp;ドロップアップロード対応</li>
    </ul>
    <h2>技術ハイライト</h2>
    <ul>
      <li>Gemini 3 Pro Image Preview APIで画像生成・編集</li>
      <li>Next.js App Router + TypeScript</li>
      <li>Canvas APIでL判台紙への合成・出力</li>
      <li>WebP / PNG / JPG 対応の画像処理</li>
    </ul>
    <h2>技術スタック</h2>
    <p>Next.js / TypeScript / Gemini Image AI / Canvas API / CSS</p>
