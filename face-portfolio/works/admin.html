<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Works Admin</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #0a0a0a;
      --surface:  #111111;
      --surface2: #191919;
      --border:   rgba(255,255,255,0.08);
      --border2:  rgba(255,255,255,0.14);
      --white:    #ffffff;
      --grey1:    rgba(255,255,255,0.65);
      --grey2:    rgba(255,255,255,0.35);
      --cyan:     #00f5ff;
      --red:      #ff4444;
      --green:    #00e676;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--white);
      display: flex;
      overflow: hidden;
    }

    /* ===== Sidebar ===== */
    aside {
      width: 260px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 28px 24px 20px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--white);
    }

    .sidebar-header p {
      font-size: 11px;
      color: var(--grey2);
      margin-top: 4px;
    }

    .back-link {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      font-size: 11px;
      color: var(--grey2);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--cyan); }

    .work-list { padding: 12px; flex: 1; }

    .work-item {
      padding: 14px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 4px;
    }
    .work-item:hover { background: var(--surface2); }
    .work-item.active { background: rgba(0,245,255,0.08); border: 1px solid rgba(0,245,255,0.2); }

    .work-item-tag {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--cyan);
      margin-bottom: 4px;
    }
    .work-item-title {
      font-size: 14px;
      font-weight: 400;
      color: var(--white);
    }

    /* ===== Main ===== */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .top-bar {
      height: 64px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      flex-shrink: 0;
    }

    .top-bar-title {
      font-size: 13px;
      font-weight: 400;
      color: var(--grey1);
    }

    .top-bar-title span {
      color: var(--white);
      font-weight: 500;
    }

    .top-actions { display: flex; gap: 12px; align-items: center; }

    .btn-save {
      padding: 9px 24px;
      background: var(--white);
      color: var(--bg);
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: opacity 0.2s;
      border-radius: 4px;
    }
    .btn-save:hover { opacity: 0.85; }
    .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-preview {
      padding: 9px 20px;
      background: transparent;
      color: var(--grey1);
      border: 1px solid var(--border2);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      border-radius: 4px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
    .btn-preview:hover { border-color: var(--white); color: var(--white); }

    .save-status {
      font-size: 11px;
      color: var(--grey2);
      min-width: 80px;
      text-align: right;
    }
    .save-status.saved { color: var(--green); }
    .save-status.error { color: var(--red); }

    /* ===== Form ===== */
    .form-area {
      flex: 1;
      overflow-y: auto;
      padding: 40px 48px;
    }

    .form-section {
      margin-bottom: 48px;
    }

    .form-section-title {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--cyan);
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    .form-grid.cols-1 { grid-template-columns: 1fr; }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field label {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--grey2);
      text-transform: uppercase;
    }

    .field input,
    .field textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 300;
      resize: vertical;
      transition: border-color 0.2s;
      outline: none;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: rgba(0,245,255,0.4);
    }

    .field textarea { min-height: 80px; }
    .field textarea.tall { min-height: 120px; }

    /* ===== Array field ===== */
    .array-field { display: flex; flex-direction: column; gap: 8px; }

    .array-field label {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--grey2);
      text-transform: uppercase;
    }

    .array-items { display: flex; flex-direction: column; gap: 6px; }

    .array-item {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .array-item input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 9px 12px;
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 300;
      outline: none;
      transition: border-color 0.2s;
    }
    .array-item input:focus { border-color: rgba(0,245,255,0.4); }

    .btn-remove {
      width: 28px; height: 28px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--grey2);
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-remove:hover { border-color: var(--red); color: var(--red); }

    .btn-add {
      margin-top: 6px;
      padding: 8px 14px;
      background: transparent;
      border: 1px dashed var(--border2);
      border-radius: 6px;
      color: var(--grey2);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      align-self: flex-start;
    }
    .btn-add:hover { border-color: var(--cyan); color: var(--cyan); }

    /* ===== Tag list ===== */
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .tag-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 12px;
      color: var(--grey1);
    }

    .tag-chip-input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--grey1);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      min-width: 60px;
      max-width: 140px;
      width: auto;
    }

    .tag-remove {
      background: none;
      border: none;
      color: var(--grey2);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0;
      transition: color 0.2s;
    }
    .tag-remove:hover { color: var(--red); }

    .btn-add-tag {
      padding: 5px 14px;
      background: transparent;
      border: 1px dashed var(--border2);
      border-radius: 100px;
      color: var(--grey2);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-add-tag:hover { border-color: var(--cyan); color: var(--cyan); }

    /* ===== GitHub panel ===== */
    .gh-panel {
      border-top: 1px solid var(--border);
      padding: 16px;
    }

    .gh-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      padding: 8px 8px;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .gh-toggle:hover { background: var(--surface2); }

    .gh-toggle-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--grey2);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .gh-toggle-icon {
      font-size: 13px;
      color: var(--grey2);
      transition: transform 0.2s;
    }
    .gh-toggle.open .gh-toggle-icon { transform: rotate(180deg); }

    .gh-fields {
      display: none;
      flex-direction: column;
      gap: 10px;
      margin-top: 12px;
    }
    .gh-fields.open { display: flex; }

    .gh-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .gh-field label {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--grey2);
    }
    .gh-field input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 8px 10px;
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 300;
      outline: none;
      transition: border-color 0.2s;
    }
    .gh-field input:focus { border-color: rgba(0,245,255,0.4); }

    .btn-save-cfg {
      margin-top: 4px;
      padding: 8px;
      width: 100%;
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: 5px;
      color: var(--grey1);
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-save-cfg:hover { border-color: var(--cyan); color: var(--cyan); }

    .gh-status {
      font-size: 10px;
      text-align: center;
      margin-top: 4px;
      min-height: 14px;
      color: var(--grey2);
    }
    .gh-status.ok  { color: var(--green); }
    .gh-status.err { color: var(--red); }

    /* ===== Empty state ===== */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--grey2);
      gap: 12px;
    }
    .empty-state p { font-size: 14px; font-weight: 300; }

    /* ===== Toast ===== */
    #toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 400;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 999;
    }
    #toast.show { opacity: 1; }
    #toast.success { background: rgba(0,230,118,0.15); border: 1px solid rgba(0,230,118,0.3); color: var(--green); }
    #toast.error   { background: rgba(255,68,68,0.12);  border: 1px solid rgba(255,68,68,0.3);  color: var(--red); }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside>
    <div class="sidebar-header">
      <h1>Works Admin</h1>
      <p>コンテンツ管理</p>
      <a href="../index.html" class="back-link">
        ← ポートフォリオに戻る
      </a>
    </div>
    <div class="work-list" id="work-list"></div>

    <!-- GitHub Settings -->
    <div class="gh-panel">
      <div class="gh-toggle" id="gh-toggle" onclick="toggleGhPanel()">
        <span class="gh-toggle-label">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
              0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
              -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
              .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
              -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0
              1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82
              1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01
              1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
          </svg>
          GitHub Push
        </span>
        <span class="gh-toggle-icon" id="gh-toggle-icon">▾</span>
      </div>

      <div class="gh-fields" id="gh-fields">
        <div class="gh-field">
          <label>Token</label>
          <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx">
        </div>
        <div class="gh-field">
          <label>Owner</label>
          <input type="text" id="gh-owner" placeholder="your-github-username">
        </div>
        <div class="gh-field">
          <label>Repo</label>
          <input type="text" id="gh-repo" placeholder="face-portfolio">
        </div>
        <div class="gh-field">
          <label>Branch</label>
          <input type="text" id="gh-branch" placeholder="main">
        </div>
        <div class="gh-field">
          <label>File Path</label>
          <input type="text" id="gh-filepath" placeholder="works/data.json">
        </div>
        <button class="btn-save-cfg" onclick="saveConfig()">Save Config</button>
        <div class="gh-status" id="gh-config-status"></div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main>
    <div class="top-bar">
      <div class="top-bar-title" id="top-title">ワークを選択してください</div>
      <div class="top-actions">
        <span class="save-status" id="save-status"></span>
        <a class="btn-preview" id="btn-preview" href="#" target="_blank">Preview ↗</a>
        <button class="btn-save" id="btn-save" onclick="saveWork()" disabled>Save</button>
      </div>
    </div>
    <div class="form-area" id="form-area">
      <div class="empty-state">
        <p>左のリストからワークを選択してください</p>
      </div>
    </div>
  </main>

  <div id="toast"></div>

  <script>
    let allData   = {};
    let activeId  = null;

    // ===== Load data =====
    async function loadData() {
      const res  = await fetch('/api/works');
      allData    = await res.json();
      renderSidebar();
    }

    // ===== GitHub config =====
    async function loadConfig() {
      try {
        const res = await fetch('/api/config');
        if (!res.ok) return;
        const cfg = await res.json();
        const gh  = cfg.github || {};
        if (gh.token)    document.getElementById('gh-token').value    = gh.token;
        if (gh.owner)    document.getElementById('gh-owner').value    = gh.owner;
        if (gh.repo)     document.getElementById('gh-repo').value     = gh.repo;
        if (gh.branch)   document.getElementById('gh-branch').value   = gh.branch;
        if (gh.filePath) document.getElementById('gh-filepath').value = gh.filePath;
      } catch (_) {}
    }

    async function saveConfig() {
      const statusEl = document.getElementById('gh-config-status');
      const cfg = {
        github: {
          token:    document.getElementById('gh-token').value.trim(),
          owner:    document.getElementById('gh-owner').value.trim(),
          repo:     document.getElementById('gh-repo').value.trim(),
          branch:   document.getElementById('gh-branch').value.trim() || 'main',
          filePath: document.getElementById('gh-filepath').value.trim() || 'works/data.json',
        }
      };
      try {
        const res = await fetch('/api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(cfg),
        });
        if (!res.ok) throw new Error();
        statusEl.textContent = '✓ 保存しました';
        statusEl.className   = 'gh-status ok';
      } catch (_) {
        statusEl.textContent = '✗ 保存に失敗しました';
        statusEl.className   = 'gh-status err';
      }
      setTimeout(() => { statusEl.textContent = ''; statusEl.className = 'gh-status'; }, 2500);
    }

    function toggleGhPanel() {
      const toggle = document.getElementById('gh-toggle');
      const fields = document.getElementById('gh-fields');
      toggle.classList.toggle('open');
      fields.classList.toggle('open');
    }

    // ===== Sidebar =====
    function renderSidebar() {
      const list = document.getElementById('work-list');
      list.innerHTML = Object.values(allData).map(w => `
        <div class="work-item ${activeId === w.id ? 'active' : ''}"
             onclick="selectWork('${w.id}')">
          <div class="work-item-tag">${w.tag}</div>
          <div class="work-item-title">${w.title}</div>
        </div>
      `).join('');
    }

    // ===== Select work =====
    function selectWork(id) {
      activeId = id;
      renderSidebar();
      renderForm(allData[id]);
      document.getElementById('btn-save').disabled = false;
      document.getElementById('top-title').innerHTML =
        `Editing: <span>${allData[id].title}</span>`;
      document.getElementById('btn-preview').href = `${id}.html`;
    }

    // ===== Render form =====
    function renderForm(w) {
      document.getElementById('form-area').innerHTML = `

        <!-- Basic Info -->
        <div class="form-section">
          <div class="form-section-title">Basic Info</div>
          <div class="form-grid cols-3">
            ${field('Title', 'title', w.title)}
            ${field('Tag', 'tag', w.tag)}
            ${field('Role', 'role', w.role)}
            ${field('Year', 'year', w.year)}
            ${field('Type', 'type', w.type)}
          </div>
        </div>

        <!-- Mock Screen -->
        <div class="form-section">
          <div class="form-section-title">Mock Screen</div>
          <div class="form-grid">
            ${field('URL Label', 'mockUrl', w.mockUrl)}
            ${field('Display Text (画像なし時)', 'mockLabel', w.mockLabel)}
          </div>
          <div class="form-grid cols-1" style="margin-top:16px">
            ${field('Screenshot Image URL (設定すると画像表示)', 'mockImage', w.mockImage || '')}
          </div>
        </div>

        <!-- Overview -->
        <div class="form-section">
          <div class="form-section-title">Overview</div>
          <div class="form-grid cols-1">
            ${field('Heading (\\n で改行)', 'overviewHeading', w.overviewHeading)}
            ${textarea('Body Text', 'overviewBody', w.overviewBody, 'tall')}
          </div>
        </div>

        <!-- Features -->
        <div class="form-section">
          <div class="form-section-title">Features / Details</div>
          <div class="form-grid">
            <div>
              ${field('Left Column Label', 'leftLabel', w.leftLabel)}
              ${arrayField('leftItems', w.leftItems)}
            </div>
            <div>
              ${field('Right Column Label', 'rightLabel', w.rightLabel)}
              ${arrayField('rightItems', w.rightItems)}
            </div>
          </div>
        </div>

        <!-- Tech Stack -->
        <div class="form-section">
          <div class="form-section-title">Tech Stack</div>
          ${tagField('techStack', w.techStack)}
        </div>

        <!-- CTA & Links -->
        <div class="form-section">
          <div class="form-section-title">CTA & Links</div>
          <div class="form-grid">
            ${field('CTA Heading (\\n で改行)', 'ctaHeading', w.ctaHeading)}
            ${field('Live URL', 'liveUrl', w.liveUrl)}
            ${field('GitHub URL', 'githubUrl', w.githubUrl)}
          </div>
        </div>

      `;
    }

    // ===== Field helpers =====
    function field(label, key, value) {
      return `<div class="field">
        <label>${label}</label>
        <input type="text" data-key="${key}" value="${escHtml(value || '')}" oninput="onFieldChange()">
      </div>`;
    }

    function textarea(label, key, value, extra = '') {
      return `<div class="field">
        <label>${label}</label>
        <textarea data-key="${key}" class="${extra}" oninput="onFieldChange()">${escHtml(value || '')}</textarea>
      </div>`;
    }

    function arrayField(key, items) {
      const rows = (items || []).map((item, i) => `
        <div class="array-item">
          <input type="text" data-array="${key}" data-idx="${i}" value="${escHtml(item)}" oninput="onFieldChange()">
          <button class="btn-remove" onclick="removeArrayItem('${key}', ${i})">×</button>
        </div>
      `).join('');
      return `<div class="array-field">
        <div class="array-items" id="arr-${key}">${rows}</div>
        <button class="btn-add" onclick="addArrayItem('${key}')">+ Add item</button>
      </div>`;
    }

    function tagField(key, tags) {
      const chips = (tags || []).map((t, i) => `
        <div class="tag-chip">
          <input class="tag-chip-input" data-tag="${key}" data-idx="${i}"
                 value="${escHtml(t)}" oninput="resizeTagInput(this); onFieldChange()"
                 onload="resizeTagInput(this)">
          <button class="tag-remove" onclick="removeTag('${key}', ${i})">×</button>
        </div>
      `).join('');
      return `<div>
        <div class="tag-list" id="tags-${key}">${chips}</div>
        <button class="btn-add-tag" style="margin-top:12px" onclick="addTag('${key}')">+ Add tag</button>
      </div>`;
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ===== Array operations =====
    function addArrayItem(key) {
      const w = allData[activeId];
      w[key] = [...(w[key] || []), ''];
      renderForm(w);
      onFieldChange();
      // focus last
      const container = document.getElementById(`arr-${key}`);
      const inputs = container.querySelectorAll('input');
      if (inputs.length) inputs[inputs.length - 1].focus();
    }

    function removeArrayItem(key, idx) {
      const w = allData[activeId];
      w[key] = w[key].filter((_, i) => i !== idx);
      renderForm(w);
      onFieldChange();
    }

    // ===== Tag operations =====
    function addTag(key) {
      const w = allData[activeId];
      w[key] = [...(w[key] || []), ''];
      renderForm(w);
      onFieldChange();
      const container = document.getElementById(`tags-${key}`);
      const inputs = container.querySelectorAll('.tag-chip-input');
      if (inputs.length) { inputs[inputs.length - 1].focus(); resizeTagInput(inputs[inputs.length - 1]); }
    }

    function removeTag(key, idx) {
      const w = allData[activeId];
      w[key] = w[key].filter((_, i) => i !== idx);
      renderForm(w);
      onFieldChange();
    }

    function resizeTagInput(el) {
      el.style.width = Math.max(60, el.value.length * 8 + 16) + 'px';
    }

    // ===== Collect form data =====
    function collectFormData() {
      const w = { ...allData[activeId] };

      // Plain inputs
      document.querySelectorAll('[data-key]').forEach(el => {
        w[el.dataset.key] = el.value;
      });

      // Arrays
      const arrayKeys = ['leftItems', 'rightItems'];
      arrayKeys.forEach(key => {
        const items = [];
        document.querySelectorAll(`[data-array="${key}"]`).forEach(el => {
          if (el.value.trim()) items.push(el.value);
        });
        w[key] = items;
      });

      // Tags
      const tagItems = [];
      document.querySelectorAll('[data-tag="techStack"]').forEach(el => {
        if (el.value.trim()) tagItems.push(el.value);
      });
      w.techStack = tagItems;

      return w;
    }

    // ===== Field change =====
    function onFieldChange() {
      const status = document.getElementById('save-status');
      status.textContent = '未保存';
      status.className = 'save-status';
    }

    // ===== Save =====
    async function saveWork() {
      const btn    = document.getElementById('btn-save');
      const status = document.getElementById('save-status');

      // Collect latest form values
      allData[activeId] = collectFormData();

      btn.disabled    = true;
      btn.textContent = 'Saving...';
      status.textContent = '';

      try {
        const res = await fetch('/api/works', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(allData),
        });
        if (!res.ok) throw new Error('Server error');
        const data = await res.json();

        if (data.github?.ok) {
          showToast(`保存 + GitHub push ✓  (${data.github.sha})`, 'success');
        } else if (data.github?.error) {
          showToast(`保存済み / GitHub: ${data.github.error}`, 'error');
        } else {
          showToast('保存しました ✓', 'success');
        }

        status.textContent = '保存済み';
        status.className   = 'save-status saved';
      } catch (e) {
        showToast('保存に失敗しました', 'error');
        status.textContent = 'エラー';
        status.className   = 'save-status error';
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Save';
      }
    }

    // ===== Toast =====
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className   = `show ${type}`;
      clearTimeout(t._timer);
      t._timer = setTimeout(() => { t.className = type; }, 2500);
    }

    // ===== Keyboard shortcut =====
    document.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 's') {
        e.preventDefault();
        if (activeId) saveWork();
      }
    });

    // ===== Init =====
    loadData();
    loadConfig();
  </script>

  <!-- Vercel Speed Insights -->
  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
