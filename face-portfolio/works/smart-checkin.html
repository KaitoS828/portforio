  <article style="padding:40px;max-width:800px;margin:0 auto;font-family:sans-serif;color:#fff;background:#05000f">
    <h1>Smart Check-in — 無人宿泊施設向けセルフチェックインアプリ</h1>
    <p><strong>作成者:</strong> 神部凱斗 (Kanbe Kaito) | <strong>Role:</strong> Full Stack Engineer | <strong>Year:</strong> 2025 | <strong>Type:</strong> Personal Project</p>
    <h2>概要</h2>
    <p>WebAuthn生体認証とSecret Codeによる二段階認証で、フロントスタッフ不在でも安全にチェックインできるWebアプリ。管理者はダッシュボードで予約管理・ゲスト登録URLの発行が可能です。</p>
    <h2>主な機能</h2>
    <ul>
      <li>Admin Dashboard：予約作成・管理、Secret Code自動生成</li>
      <li>Guest Registration：宿泊者名簿入力、パスキー登録</li>
      <li>Check-in：Usernameless生体認証 + Secret Code検証</li>
      <li>スマートロックPIN表示（チェックイン完了後）</li>
      <li>期限切れChallenge自動削除（Vercel Cron）</li>
    </ul>
    <h2>技術ハイライト</h2>
    <ul>
      <li>FIDO2 / WebAuthn（@simplewebauthn）でパスキー認証</li>
      <li>Supabase RLSで行レベルセキュリティ</li>
      <li>Zod によるサーバーサイドバリデーション</li>
      <li>Next.js 15 App Router + TypeScript</li>
      <li>Vercel Cronで定期クリーンアップ</li>
    </ul>
    <h2>技術スタック</h2>
    <p>Next.js 15 / TypeScript / Tailwind CSS 4 / Supabase / WebAuthn / Zod / Vercel</p>
