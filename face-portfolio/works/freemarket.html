  <article style="padding:40px;max-width:800px;margin:0 auto;font-family:sans-serif;color:#fff;background:#05000f">
    <h1>Coachtech Freemarket — PHP/Laravelで構築したフリマアプリ</h1>
    <p><strong>作成者:</strong> 神部凱斗 (Kanbe Kaito) | <strong>Role:</strong> Backend Engineer | <strong>Year:</strong> 2024 | <strong>Type:</strong> Training Project</p>
    <h2>概要</h2>
    <p>プログラミングスクール（CoachTech）の学習課題として制作したフリマアプリ。商品出品・Stripe決済・取引チャット・相互評価など、実際のECサービスに近い機能を一通り実装しています。</p>
    <h2>主な機能</h2>
    <ul>
      <li>会員登録・ログイン（Laravel Fortify、メール認証）</li>
      <li>商品出品：画像アップロード、カテゴリ・状態設定</li>
      <li>商品購入：Stripe決済、配送先変更</li>
      <li>取引チャット機能：購入後の非公開チャット、未読通知</li>
      <li>相互評価機能：5段階評価 + コメント</li>
    </ul>
    <h2>技術ハイライト</h2>
    <ul>
      <li>Laravel Fortify + メール認証でセキュアな会員管理</li>
      <li>Stripe API でカード決済・コンビニ払いシミュレーション</li>
      <li>Laravel Event/Listener で取引完了メール通知</li>
      <li>Nginx + PHP-FPM + MySQL の本番想定Docker環境</li>
      <li>MailHog でローカルメール送受信テスト</li>
    </ul>
    <h2>技術スタック</h2>
    <p>PHP 8.x / Laravel 8.x / MySQL 8.0 / Nginx / Docker / Stripe API</p>
