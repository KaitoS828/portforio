  <article style="padding:40px;max-width:800px;margin:0 auto;font-family:sans-serif;color:#fff;background:#05000f">
    <h1>サプリCSVセンター — 入会申込書データをAIが自動抽出</h1>
    <p><strong>作成者:</strong> 神部凱斗 (Kanbe Kaito) | <strong>Role:</strong> Full Stack Engineer | <strong>Year:</strong> 2025 | <strong>Type:</strong> Business Tool | <strong>場所:</strong> 北海道広尾町</p>
    <h2>概要</h2>
    <p>広尾町の地域通貨「サプリ」の業務効率化ツール。PDFや画像の入会申込書をGemini AIが一括解析し、全31項目のデータを抽出してCSV/Excelで出力。比較編集モードで原本と入力フォームを並べて確認できます。</p>
    <h2>主な機能</h2>
    <ul>
      <li>マルチページPDF対応（1ページ=1件として一括処理）</li>
      <li>比較編集モード（Split View）：原本と入力フォームを左右表示</li>
      <li>自動データ整形：電話番号フォーマット統一、和暦→西暦変換</li>
      <li>CSV/Excel出力（全31項目、BOM付きCSV、2000行固定）</li>
      <li>誤操作防止：CLEARボタン2回クリック確認フロー</li>
    </ul>
    <h2>技術ハイライト</h2>
    <ul>
      <li>Gemini AIによるPDF/画像からの構造化データ抽出</li>
      <li>ドラッグ&amp;ドロップによる一括アップロード</li>
      <li>ショートカットキー（Ctrl+Enter保存、Escキャンセル）</li>
      <li>Docker コンテナ化で安定した実行環境</li>
    </ul>
    <h2>技術スタック</h2>
    <p>Next.js / Gemini AI / Docker / TypeScript / Excel Export</p>
