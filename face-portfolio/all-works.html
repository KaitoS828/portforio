    body { background: var(--bg); }

    .page-wrap {

    .page-header .count {
      font-size: 0.8rem;

      font-weight: 300;
      letter-spacing: 0.1em;
    }

    .all-works-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1px;
      border: 1px solid var(--border);
      margin-bottom: 1px;
    }

    .all-work-card {
      background: var(--bg);
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.3s ease;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease, background 0.3s ease;
    }
    .all-work-card.visible { opacity: 1; transform: translateY(0); }
    .all-work-card:hover { background: rgba(255,255,255,0.03); }

    .all-work-card-inner { padding: 36px 32px; }

    .work-tag {
      display: inline-block;
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--grey-2);
      border-bottom: 1px solid var(--border);
      padding-bottom: 4px;
      margin-bottom: 20px;
    }

    .all-work-card h3 {
      font-size: 1.3rem;
      font-weight: 300;
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }

    .all-work-card p {
      color: var(--grey-1);
      font-size: 0.82rem;
      font-weight: 300;
      line-height: 1.75;
      margin-bottom: 24px;
    }

    .card-link {
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--grey-2);
      transition: color 0.3s ease;
    }
    .all-work-card:hover .card-link { color: var(--white); }

    .back-to-top {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 20px;
      border: 1px solid var(--border);
      color: var(--grey-2);
      text-decoration: none;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      transition: color 0.3s ease, background 0.3s ease;
    }
    .back-to-top:hover { color: var(--white); background: rgba(255,255,255,0.03); }

    @media (max-width: 768px) {
      .page-wrap { padding: 100px 6vw 80px; }

  <script>
    // ===== Language =====
    function getLang() { return localStorage.getItem('lang') || 'ja'; }
    function switchLang(l) { localStorage.setItem('lang', l); location.reload(); }
    document.querySelectorAll('.lang-btn[data-lang]').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === getLang());
    });
    if (getLang() === 'en') {
      document.getElementById('js-page-title').textContent = 'All Projects';
      document.getElementById('js-back-label').textContent = 'Back to Portfolio';
    }

    // Cursor
    const cursorEl = document.querySelector('.cursor');
    const trailEl  = document.querySelector('.cursor-trail');
    let mx = 0, my = 0, tx = 0, ty = 0;
    document.addEventListener('mousemove', (e) => {
      mx = e.clientX; my = e.clientY;
      if (cursorEl) { cursorEl.style.left = mx + 'px'; cursorEl.style.top = my + 'px'; }
    });
    (function loop() {
      tx += (mx - tx) * 0.12; ty += (my - ty) * 0.12;
      if (trailEl) { trailEl.style.left = tx + 'px'; trailEl.style.top = ty + 'px'; }
      requestAnimationFrame(loop);
    })();

    // Scroll fade-in
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.08 });

    // Load works
    const dataUrl = getLang() === 'en' ? '/site-data-en.json' : '/site-data.json';
    fetch(dataUrl)
      .then(r => r.json())
      .then(data => {
        const cards = data.works?.cards || [];
        document.getElementById('js-count').textContent = `${cards.length} projects`;

        const grid = document.getElementById('js-all-works-grid');
        grid.innerHTML = cards.map((c, i) => {
          const onClick = c.link.startsWith('http')
            ? `window.open('${c.link}', '_blank')`
            : `location.href='${c.link}'`;
          const label = c.link.startsWith('http') ? 'View on GitHub →' : 'View Project →';
          return `
          <div class="all-work-card" onclick="${onClick}" style="transition-delay:${i * 60}ms">
            <div class="all-work-card-inner">
              <div class="work-tag">${c.tag}</div>
              <h3>${c.title}</h3>
              <p>${c.desc}</p>
              <span class="card-link">${label}</span>
            </div>
          </div>`;
        }).join('');

        document.querySelectorAll('.all-work-card').forEach(el => observer.observe(el));
      })
      .catch(() => {});
  </script>
