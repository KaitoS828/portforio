<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <title>404 — Page Not Found | Kanbe Kaito</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/assets/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  <meta name="theme-color" content="#00f5ff">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400&family=Inter:wght@200;300;400&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:     #0a0a0a;
      --white:  #ffffff;
      --grey-1: rgba(255,255,255,0.65);
      --grey-2: rgba(255,255,255,0.3);
      --border: rgba(255,255,255,0.1);
      --cyan:   #00f5ff;
      --serif:  'Playfair Display', Georgia, serif;
      --sans:   'Inter', 'Helvetica Neue', sans-serif;
    }

    html, body {
      height: 100%;
      font-family: var(--sans);
      background: var(--bg);
      color: var(--white);
      overflow: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 80px 80px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }

    .code {
      font-family: var(--serif);
      font-style: italic;
      font-size: clamp(96px, 18vw, 200px);
      line-height: 1;
      color: transparent;
      -webkit-text-stroke: 1px rgba(255,255,255,0.15);
      letter-spacing: -0.04em;
      user-select: none;
      margin-bottom: 8px;
    }

    .label {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--cyan);
      margin-bottom: 32px;
    }

    .message {
      font-size: clamp(14px, 2vw, 17px);
      font-weight: 300;
      color: var(--grey-1);
      line-height: 1.7;
      max-width: 400px;
      margin-bottom: 48px;
    }

    .actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      background: var(--cyan);
      color: #000;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.06em;
      text-decoration: none;
      border-radius: 2px;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.85; }

    .btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      border: 1px solid var(--border);
      color: var(--grey-1);
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.06em;
      text-decoration: none;
      border-radius: 2px;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-outline:hover { border-color: rgba(255,255,255,0.35); color: var(--white); }

    .footer-note {
      position: fixed;
      bottom: 32px;
      font-size: 11px;
      font-weight: 300;
      color: var(--grey-2);
      letter-spacing: 0.1em;
    }

    @media (max-width: 480px) {
      .actions { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <p class="label">Page Not Found</p>
    <p class="message">お探しのページは存在しないか、移動した可能性があります。</p>
    <div class="actions">
      <a href="/" class="btn-primary">← ホームに戻る</a>
      <a href="/all-works.html" class="btn-outline">作品一覧を見る</a>
    </div>
  </div>
  <p class="footer-note">kaito-kanbe.com</p>
</body>
</html>
