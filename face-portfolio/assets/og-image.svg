<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Cyan glow -->
  <radialGradient id="glow" cx="70%" cy="40%" r="50%">
    <stop offset="0%"   stop-color="#00f5ff" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Grid lines -->
  <line x1="0" y1="1" x2="1200" y2="1"   stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="0" y1="629" x2="1200" y2="629" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="1" y1="0" x2="1" y2="630"   stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="1199" y1="0" x2="1199" y2="630" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Tag -->
  <text x="80" y="220" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="300" letter-spacing="4" fill="#00f5ff" text-transform="uppercase">PORTFOLIO</text>

  <!-- Name -->
  <text x="80" y="340" font-family="Georgia, serif" font-size="90" font-weight="400" fill="#ffffff" letter-spacing="-2">Sekimoto Kaito</text>

  <!-- Title -->
  <text x="82" y="400" font-family="'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="300" fill="rgba(255,255,255,0.55)" letter-spacing="1">Creative Developer &amp; Designer</text>

  <!-- Divider -->
  <line x1="80" y1="430" x2="400" y2="430" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Skills -->
  <text x="80" y="470" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="300" fill="rgba(255,255,255,0.35)" letter-spacing="2">Three.js · AI · React · FastAPI · Ruby on Rails</text>

  <!-- Logo mark top-right -->
  <text x="1120" y="80" font-family="Georgia, serif" font-size="32" font-weight="700" fill="#00f5ff" text-anchor="middle">FP</text>
</svg>
